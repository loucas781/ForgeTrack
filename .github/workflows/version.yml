name: Version

# ── REQUIRED SETUP ────────────────────────────────────────────────────────────
# GitHub repo → Settings → Actions → General
# → Workflow permissions → Read and write permissions → Save
# ─────────────────────────────────────────────────────────────────────────────

on:
  # develop: bump on every push (auto-increments dev counter)
  push:
    branches: [develop]
    paths-ignore:
      - '.version'
      - 'package.json'
      - 'BUILDCOUNT'

  # staging + main: bump when a PR is merged INTO them
  pull_request:
    branches: [staging, main]
    types: [closed]

  # Manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to bump version on'
        required: true
        default: 'develop'
        type: choice
        options: [develop, staging, main]

permissions:
  contents: write

jobs:
  bump-version:
    name: Bump version
    runs-on: ubuntu-latest

    # For pull_request: only run when the PR was actually merged (not just closed)
    # For push to develop: skip if this is our own version bump commit
    if: |
      (github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]')) ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    steps:
      - name: Determine target branch
        id: branch
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "name=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ github.event.inputs.branch }}" >> $GITHUB_OUTPUT
          else
            # pull_request — bump the branch being merged INTO
            echo "name=${{ github.event.pull_request.base.ref }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.branch.outputs.name }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          BRANCH="${{ steps.branch.outputs.name }}"
          CURRENT=$(cat .version | tr -d '[:space:]')

          # Debug output
          echo "═══════════════════════════════════════════════════════════"
          echo "Branch: $BRANCH"
          echo "Current version in .version: $CURRENT"
          echo "Event: ${{ github.event_name }}"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "PR merged: ${{ github.event.pull_request.merged }}"
            echo "Source branch: ${{ github.event.pull_request.head.ref }}"
          fi
          echo "Latest commits:"
          git log --oneline -3
          echo "═══════════════════════════════════════════════════════════"

          # Strip any pre-release suffix to get clean base semver x.y.z
          BASE=$(echo "$CURRENT" | sed 's/-dev\.[0-9]*//' | sed 's/-rc.*//')
          MAJOR=$(echo "$BASE" | cut -d. -f1)
          MINOR=$(echo "$BASE" | cut -d. -f2)
          PATCH=$(echo "$BASE" | cut -d. -f3)

          if [[ "$BRANCH" == "main" ]]; then
            # Production release: bump minor, reset patch
            MINOR=$((MINOR + 1))
            PATCH=0
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"

          elif [[ "$BRANCH" == "staging" ]]; then
            # RC: bump patch so each staging build has a distinct number
            PATCH=$((PATCH + 1))
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}-rc"

          elif [[ "$BRANCH" == "develop" ]]; then
            # Dev: total commit count as the build number
            DEV_NUM=$(git rev-list --count HEAD)
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}-dev.${DEV_NUM}"
          fi

          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${NEW_VERSION}"        >> $GITHUB_OUTPUT
          echo "branch=${BRANCH}"           >> $GITHUB_OUTPUT
          echo "$NEW_VERSION" > .version
          echo "Bumped: ${CURRENT} → ${NEW_VERSION}"

      - name: Sync base version into package.json
        run: |
          BASE=$(echo "${{ steps.bump.outputs.new_version }}" | sed 's/-dev\.[0-9]*//' | sed 's/-rc.*//')
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = '${BASE}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Commit version files
        run: |
          git add .version package.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "[skip ci] chore: bump version to ${{ steps.bump.outputs.new_version }}"
          git push origin HEAD:${{ steps.branch.outputs.name }}

      - name: Create or replace Git tag
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true
          git tag -a "$TAG" -m "Release ${{ steps.bump.outputs.new_version }} from ${{ steps.branch.outputs.name }}"
          git push origin "$TAG"

      - name: Summary
        run: |
          echo "### 🏷️ Version bumped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ steps.branch.outputs.name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| New version | \`${{ steps.bump.outputs.new_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Git tag | \`${{ steps.bump.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
