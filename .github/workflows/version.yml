name: Version

# ── REQUIRED SETUP ────────────────────────────────────────────────────────────
# This workflow commits .version back to the repo on every push.
# For it to work you MUST enable write permissions in your repo:
#
#   GitHub repo → Settings → Actions → General
#   → Workflow permissions → Read and write permissions → Save
#
# Once enabled, every push to develop will produce versions like 0.0.1-dev.1
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, staging, develop]
    paths-ignore:
      - '.version'      # prevent infinite loop when this workflow commits .version
      - 'package.json'

permissions:
  contents: write

jobs:
  bump-version:
    name: Bump version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          BRANCH="${GITHUB_REF##*/}"
          CURRENT=$(cat .version | tr -d '[:space:]')

          # Strip any existing pre-release suffix to get base semver
          BASE=$(echo "$CURRENT" | sed 's/-dev\.[0-9]*//' | sed 's/-rc//')
          MAJOR=$(echo "$BASE" | cut -d. -f1)
          MINOR=$(echo "$BASE" | cut -d. -f2)
          PATCH=$(echo "$BASE" | cut -d. -f3)

          if [[ "$BRANCH" == "main" ]]; then
            MINOR=$((MINOR + 1))
            PATCH=0
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            TAG="v${NEW_VERSION}"

          elif [[ "$BRANCH" == "staging" ]]; then
            PATCH=$((PATCH + 1))
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            TAG="v${NEW_VERSION}-rc"

          elif [[ "$BRANCH" == "develop" ]]; then
            # Use total commit count on this branch as the dev build number
            # This is always unique and always increasing
            DEV_NUM=$(git rev-list --count HEAD)
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}-dev.${DEV_NUM}"
            TAG="v${NEW_VERSION}"
          fi

          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}"                 >> $GITHUB_OUTPUT
          echo "branch=${BRANCH}"           >> $GITHUB_OUTPUT
          echo "$NEW_VERSION" > .version
          echo "Bumped: ${CURRENT} → ${NEW_VERSION} (tag: ${TAG})"

      - name: Sync version into package.json
        run: |
          BASE=$(echo "${{ steps.bump.outputs.new_version }}" | sed 's/-dev\.[0-9]*//' | sed 's/-rc//')
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = '${BASE}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Commit version files
        run: |
          git add .version package.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push origin HEAD:${{ steps.bump.outputs.branch }}

      - name: Create Git tag
        run: |
          # Delete existing tag if present (handles re-runs)
          git tag -d "${{ steps.bump.outputs.tag }}" 2>/dev/null || true
          git push origin ":refs/tags/${{ steps.bump.outputs.tag }}" 2>/dev/null || true
          git tag -a "${{ steps.bump.outputs.tag }}" \
            -m "Release ${{ steps.bump.outputs.new_version }} from ${{ steps.bump.outputs.branch }}"
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Summary
        run: |
          echo "### 🏷️ Version bumped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ steps.bump.outputs.branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| New version | \`${{ steps.bump.outputs.new_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Git tag | \`${{ steps.bump.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
