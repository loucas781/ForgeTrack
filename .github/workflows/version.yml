name: Version

# ── REQUIRED SETUP ────────────────────────────────────────────────────────────
# GitHub repo → Settings → Actions → General
# → Workflow permissions → Read and write permissions → Save
# ─────────────────────────────────────────────────────────────────────────────

on:
  # develop: bump on every push (auto-increments dev counter)
  # Loop prevention is handled by the [skip ci] check in the job if-condition below,
  # NOT by paths-ignore — paths-ignore would silently skip runs when .version or
  # BUILDCOUNT are legitimately part of a commit (e.g. after restoring from a zip).
  push:
    branches: [develop]

  # staging + main: bump when a PR is merged INTO them
  pull_request:
    branches: [staging, main]
    types: [closed]

  # Manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to bump version on'
        required: true
        default: 'develop'
        type: choice
        options: [develop, staging, main]

permissions:
  contents: write

jobs:
  bump-version:
    name: Bump version
    runs-on: ubuntu-latest

    # For pull_request: only run when the PR was actually merged (not just closed)
    # For push to develop: skip if this is our own version bump commit
    if: |
      (github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]')) ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    steps:
      - name: Determine target branch
        id: branch
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "name=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ github.event.inputs.branch }}" >> $GITHUB_OUTPUT
          else
            # pull_request — bump the branch being merged INTO
            echo "name=${{ github.event.pull_request.base.ref }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.branch.outputs.name }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          BRANCH="${{ steps.branch.outputs.name }}"

          # For staging/main: read the version from the SOURCE branch (the one being
          # merged in) so version numbers stay in sync across all three branches.
          # For develop: read from the current branch as normal.
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            SOURCE_BRANCH="${{ github.event.pull_request.head.ref }}"
            CURRENT=$(git show origin/${SOURCE_BRANCH}:.version 2>/dev/null | tr -d '[:space:]' || cat .version | tr -d '[:space:]')
          else
            CURRENT=$(cat .version | tr -d '[:space:]')
          fi

          # Debug output
          echo "═══════════════════════════════════════════════════════════"
          echo "Branch: $BRANCH"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "Source branch: $SOURCE_BRANCH"
            echo "Version read from source: $CURRENT"
          else
            echo "Current version in .version: $CURRENT"
          fi
          echo "Event: ${{ github.event_name }}"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "PR merged: ${{ github.event.pull_request.merged }}"
          fi
          echo "Latest commits:"
          git log --oneline -3
          echo "═══════════════════════════════════════════════════════════"

          # Strip any pre-release suffix to get clean base semver x.y.z
          BASE=$(echo "$CURRENT" | sed 's/-dev\.[0-9]*//' | sed 's/-rc.*//')
          MAJOR=$(echo "$BASE" | cut -d. -f1)
          MINOR=$(echo "$BASE" | cut -d. -f2)
          PATCH=$(echo "$BASE" | cut -d. -f3)

          if [[ "$BRANCH" == "main" ]]; then
            # Production release: bump minor, reset patch
            MINOR=$((MINOR + 1))
            PATCH=0
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"

          elif [[ "$BRANCH" == "staging" ]]; then
            # RC: bump patch so each staging build has a distinct number
            PATCH=$((PATCH + 1))
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}-rc"

          elif [[ "$BRANCH" == "develop" ]]; then
            # Dev: extract current build number from .version and increment by 1.
            # This is simple, predictable, and always goes up by exactly 1 per push.
            if echo "$CURRENT" | grep -q '\-dev\.'; then
              LAST_NUM=$(echo "$CURRENT" | sed 's/.*-dev\.//')
            else
              LAST_NUM=0
            fi
            DEV_NUM=$(( LAST_NUM + 1 ))
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}-dev.${DEV_NUM}"
          fi

          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${NEW_VERSION}"        >> $GITHUB_OUTPUT
          echo "branch=${BRANCH}"           >> $GITHUB_OUTPUT
          echo "$NEW_VERSION" > .version
          echo "Bumped: ${CURRENT} → ${NEW_VERSION}"

      - name: Sync base version into package.json
        run: |
          BASE=$(echo "${{ steps.bump.outputs.new_version }}" | sed 's/-dev\.[0-9]*//' | sed 's/-rc.*//')
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = '${BASE}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Commit version files
        run: |
          git add .version package.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "[skip ci] chore: bump version to ${{ steps.bump.outputs.new_version }}"
          git push origin HEAD:${{ steps.branch.outputs.name }}

      - name: Cascade new base version to lower branches
        if: github.event_name == 'pull_request'
        run: |
          BRANCH="${{ steps.branch.outputs.name }}"
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"

          # Strip suffix to get the clean new base (e.g. 0.0.2 from 0.0.2-rc, 0.1.0 from 0.1.0)
          NEW_BASE=$(echo "$NEW_VERSION" | sed 's/-dev\.[0-9]*//' | sed 's/-rc.*//')

          # Determine which branches sit below the one we just bumped
          if [[ "$BRANCH" == "main" ]]; then
            DOWNSTREAM="staging develop"
          elif [[ "$BRANCH" == "staging" ]]; then
            DOWNSTREAM="develop"
          else
            DOWNSTREAM=""
          fi

          for TARGET in $DOWNSTREAM; do
            echo "── Syncing base version to $TARGET ──"
            git fetch origin $TARGET
            git checkout $TARGET

            CURRENT=$(cat .version | tr -d '[:space:]')

            # Extract the existing dev number (if any) so we preserve it
            if echo "$CURRENT" | grep -q '\-dev\.'; then
              DEV_NUM=$(echo "$CURRENT" | sed 's/.*-dev\.//')
              NEW_TARGET_VERSION="${NEW_BASE}-dev.${DEV_NUM}"
            elif echo "$CURRENT" | grep -q '\-rc'; then
              NEW_TARGET_VERSION="${NEW_BASE}-rc"
            else
              NEW_TARGET_VERSION="${NEW_BASE}"
            fi

            echo "$NEW_TARGET_VERSION" > .version

            # Sync package.json too
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
              pkg.version = '${NEW_BASE}';
              fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            "

            git add .version package.json
            git diff --cached --quiet && echo "No changes needed on $TARGET" && continue
            git commit -m "[skip ci] chore: sync base version to ${NEW_BASE} from ${BRANCH}"
            git push origin HEAD:$TARGET
            echo "Synced $TARGET → $NEW_TARGET_VERSION"
          done

      - name: Create or replace Git tag
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          # Fetch all tags so we have an accurate local picture before deleting
          git fetch --tags --force 2>/dev/null || true
          # Delete locally and remotely if the tag already exists (e.g. re-run)
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true
          git tag -a "$TAG" -m "Release ${{ steps.bump.outputs.new_version }} from ${{ steps.branch.outputs.name }}"
          git push origin "$TAG"

      - name: Summary
        run: |
          echo "### 🏷️ Version bumped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ steps.branch.outputs.name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| New version | \`${{ steps.bump.outputs.new_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Git tag | \`${{ steps.bump.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
