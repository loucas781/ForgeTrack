name: Version

# ── REQUIRED SETUP ────────────────────────────────────────────────────────────
# GitHub repo → Settings → Actions → General
# → Workflow permissions → Read and write permissions → Save
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [develop]
    paths-ignore:
      - '.version'
      - 'package.json'

  # staging and main use pull_request merge trigger so the workflow always fires
  # on merge regardless of which files changed (avoids the paths-ignore trap)
  pull_request:
    branches: [staging, main]
    types: [closed]

  # Allow manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to bump version on'
        required: true
        default: 'develop'
        type: choice
        options: [develop, staging, main]

permissions:
  contents: write

jobs:
  bump-version:
    name: Bump version
    runs-on: ubuntu-latest

    # For pull_request trigger: only run when the PR was actually merged
    if: |
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)

    steps:
      - name: Determine branch
        id: branch
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "name=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "name=${{ github.event.inputs.branch }}" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.event.pull_request.base.ref }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.branch.outputs.name }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump
        run: |
          BRANCH="${{ steps.branch.outputs.name }}"
          CURRENT=$(cat .version | tr -d '[:space:]')

          # Strip any pre-release suffix to get clean base semver x.y.z
          BASE=$(echo "$CURRENT" | sed 's/-dev\.[0-9]*//' | sed 's/-rc.*//')
          MAJOR=$(echo "$BASE" | cut -d. -f1)
          MINOR=$(echo "$BASE" | cut -d. -f2)
          PATCH=$(echo "$BASE" | cut -d. -f3)

          if [[ "$BRANCH" == "main" ]]; then
            MINOR=$((MINOR + 1))
            PATCH=0
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
            TAG="v${NEW_VERSION}"

          elif [[ "$BRANCH" == "staging" ]]; then
            # RC of current base — no patch bump, staging is a candidate of develop
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}-rc"
            TAG="v${NEW_VERSION}"

          elif [[ "$BRANCH" == "develop" ]]; then
            DEV_NUM=$(git rev-list --count HEAD)
            NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}-dev.${DEV_NUM}"
            TAG="v${NEW_VERSION}"
          fi

          echo "new_version=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}"                 >> $GITHUB_OUTPUT
          echo "branch=${BRANCH}"           >> $GITHUB_OUTPUT
          echo "$NEW_VERSION" > .version
          echo "Bumped: ${CURRENT} → ${NEW_VERSION} (tag: ${TAG})"

      - name: Sync version into package.json
        run: |
          BASE=$(echo "${{ steps.bump.outputs.new_version }}" | sed 's/-dev\.[0-9]*//' | sed 's/-rc.*//')
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json','utf8'));
            pkg.version = '${BASE}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Commit version files
        run: |
          git add .version package.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }} [skip ci]"
          git push origin HEAD:${{ steps.branch.outputs.name }}

      - name: Create Git tag
        run: |
          git tag -d "${{ steps.bump.outputs.tag }}" 2>/dev/null || true
          git push origin ":refs/tags/${{ steps.bump.outputs.tag }}" 2>/dev/null || true
          git tag -a "${{ steps.bump.outputs.tag }}" \
            -m "Release ${{ steps.bump.outputs.new_version }} from ${{ steps.branch.outputs.name }}"
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Summary
        run: |
          echo "### 🏷️ Version bumped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ steps.branch.outputs.name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| New version | \`${{ steps.bump.outputs.new_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Git tag | \`${{ steps.bump.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
