name: CI / Deploy

# ── HOW THE TRIGGER ORDER WORKS ───────────────────────────────────────────────
# develop  → push fires deploy directly (version.yml also runs, but independently)
# staging  → PR merge fires version.yml first (bumps .version, commits to staging)
#            that commit is a push to staging → fires deploy here with correct version
# main     → same as staging
#
# paths-ignore is intentionally NOT set for staging/main so the version bump
# commit (chore: bump version …) always triggers a deploy.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [develop, staging, main]
    paths-ignore:
      # Ignore version bump commits on develop only (they're not deployable changes)
      # For staging/main we WANT to deploy after the version bump commit — see above.
      # GitHub Actions doesn't support per-branch paths-ignore, so we handle this
      # in the job conditions below instead.
      - 'README.md'

jobs:
  # ── Syntax check ──────────────────────────────────────────────────
  check:
    name: Check
    runs-on: ubuntu-latest

    # On develop: skip the auto version-bump commit to avoid deploy loops
    if: |
      github.ref != 'refs/heads/develop' ||
      !startsWith(github.event.head_commit.message, 'chore: bump version')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --omit=dev --no-audit --no-fund

      - name: Syntax check
        run: node --check server/index.js
        env:
          NODE_ENV: development
          JWT_SECRET: ci-test-secret

  # ── Deploy to develop LXC ──────────────────────────────────────────
  # Requires a self-hosted runner on your Proxmox host.
  # GitHub repo → Settings → Actions → Runners → New self-hosted runner
  # Install on pve01, then uncomment below.
