  #   name: Deploy → Develop LXC
  #   needs: check
  #   runs-on: self-hosted
  #   if: github.ref == 'refs/heads/develop'
  #   steps:
  #     - name: Pull latest and restart
  #       run: pct exec ${{ vars.DEV_CTID }} -- bash /opt/forgetrack/update.sh

  # deploy-staging:
  #   name: Deploy → Staging LXC
  #   needs: check
  #   runs-on: self-hosted
  #   if: github.ref == 'refs/heads/staging'
  #   steps:
  #     - name: Pull latest and restart
  #       run: pct exec ${{ vars.STAGING_CTID }} -- bash /opt/forgetrack/update.sh

