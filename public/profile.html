<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile — ForgeTrack</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
  <script>!function(){var t=localStorage.getItem("ft-theme")||"system";t!=="system"&&document.documentElement.setAttribute("data-theme",t)}()</script>
  <style>
    .profile-avatar-wrap {
      position:relative; display:inline-block; cursor:pointer;
    }
    .profile-avatar-wrap:hover .avatar-overlay { opacity:1; }
    .avatar-overlay {
      position:absolute; inset:0; border-radius:50%;
      background:rgba(0,0,0,.5); display:flex; align-items:center;
      justify-content:center; opacity:0; transition:opacity 200ms ease;
    }
    .avatar-overlay svg { color:#fff; width:20px; height:20px; }
    #avatar-file-input { display:none; }
    .profile-card { display:flex; align-items:center; gap:20px; padding:20px; background:var(--gray-50); border:1px solid var(--border-2); border-radius:var(--r-lg); margin-bottom:20px; }
    .save-row { display:flex; align-items:center; gap:12px; }
    .save-ok { color:var(--green); font-size:13px; display:none; }
    .auth-error { display:flex;align-items:center;gap:8px;padding:10px 14px;background:#fff5f5;border:1px solid #ffc3b8;border-radius:var(--r-md);color:var(--red);font-size:13px;margin-bottom:16px;display:none }
  </style>
</head>
<body>
  <div id="app-root"></div>
  <script src="/js/app.js"></script>
  <script src="/js/shell.js"></script>
  <script>
  (async () => {
    injectShell()
    await initTopbar()
    document.title = 'Profile — ForgeTrack'
    const content = document.getElementById('page-inner')
    const config = await GET('/config')
    const me = config.user
    let selectedColor = me?.color || '#0052cc'
    let avatarDataUrl = null  // base64 image if user picks one

    content.innerHTML = `
      <div class="page-pad" style="max-width:760px">
        <h1 style="margin-bottom:4px">Your Profile</h1>
        <p class="text-2" style="margin-bottom:28px">Manage your personal information and account security</p>

        <!-- Profile info -->
        <div class="card section-card">
          <h3 class="section-title">Personal Information</h3>

          <!-- Live preview -->
          <div class="profile-card">
            <div class="profile-avatar-wrap" id="avatar-wrap" title="Click to upload a photo">
              <div id="avatar-preview">${avatarHtml(me, 64)}</div>
              <div class="avatar-overlay">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
              </div>
              <input type="file" id="avatar-file-input" accept="image/*" />
            </div>
            <div>
              <div style="font-size:16px;font-weight:600" id="preview-name">${esc(me?.name)}</div>
              <div class="text-3 text-sm">${esc(me?.email)}</div>
              <div class="text-3 text-sm" style="margin-top:2px">Role: <strong style="color:var(--text-2)">${esc(me?.role)}</strong></div>
              <div class="text-3 text-sm" style="margin-top:6px;font-style:italic" id="avatar-hint">Click the avatar to upload a photo</div>
            </div>
          </div>

          <div id="profile-error" class="auth-error"></div>
          <form id="profile-form">
            <div class="form-group">
              <label class="form-label">Full Name</label>
              <input class="form-control" type="text" id="pf-name" value="${esc(me?.name||'')}" />
            </div>
            <div class="form-group">
              <label class="form-label">Email Address</label>
              <input class="form-control" type="text" id="pf-email" value="${esc(me?.email||'')}" inputmode="email" />
            </div>
            <div class="form-group">
              <label class="form-label">Avatar Colour <span class="text-3" style="font-weight:400">(used when no photo is set)</span></label>
              <div class="color-picker" id="avatar-colors"></div>
            </div>
            <div class="save-row">
              <button type="submit" class="btn btn-primary">Save Changes</button>
              <span class="save-ok" id="profile-saved">✓ Saved!</span>
            </div>
          </form>
        </div>

        <!-- Change password -->
        <div class="card section-card">
          <h3 class="section-title">Change Password</h3>
          <div id="pw-error" class="auth-error"></div>
          <form id="pw-form">
            <div class="form-group">
              <label class="form-label">Current Password</label>
              <input class="form-control" type="password" id="pf-cur-pw" autocomplete="current-password" />
            </div>
            <div class="form-group">
              <label class="form-label">New Password</label>
              <input class="form-control" type="password" id="pf-new-pw" placeholder="New password" autocomplete="new-password" />
            </div>
            <div class="form-group" style="margin-bottom:20px">
              <label class="form-label">Confirm New Password</label>
              <input class="form-control" type="password" id="pf-con-pw" autocomplete="new-password" />
            </div>
            <div class="save-row">
              <button type="submit" class="btn btn-primary">Update Password</button>
              <span class="save-ok" id="pw-saved">✓ Password updated!</span>
            </div>
          </form>
        </div>
      </div>`

    // Avatar color picker
    renderColorPicker(document.getElementById('avatar-colors'), AVATAR_COLORS, selectedColor, v => {
      selectedColor = v
      if (!avatarDataUrl) {
        const previewUser = { ...me, color: v, initials: (document.getElementById('pf-name').value.trim().split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2)) || me?.initials }
        document.getElementById('avatar-preview').innerHTML = avatarHtml(previewUser, 64)
      }
    })

    // Avatar image upload
    const avatarWrap = document.getElementById('avatar-wrap')
    const fileInput  = document.getElementById('avatar-file-input')
    avatarWrap.addEventListener('click', () => fileInput.click())
    let avatarMimeType = null
    fileInput.addEventListener('change', e => {
      const file = e.target.files[0]
      if (!file) return
      if (file.size > 2 * 1024 * 1024) { alert('Image must be under 2MB'); return }
      avatarMimeType = file.type
      const reader = new FileReader()
      reader.onload = ev => {
        avatarDataUrl = ev.target.result
        // Show preview as circular image (local blob URL before save)
        document.getElementById('avatar-preview').innerHTML =
          `<img src="${avatarDataUrl}" style="width:64px;height:64px;border-radius:50%;object-fit:cover;display:block" />`
        document.getElementById('avatar-hint').textContent = 'Photo selected — click Save to apply'
      }
      reader.readAsDataURL(file)
    })

    // Live name preview
    document.getElementById('pf-name').addEventListener('input', e => {
      document.getElementById('preview-name').textContent = e.target.value || me?.name
    })

    // Profile save
    document.getElementById('profile-form').addEventListener('submit', async e => {
      e.preventDefault()
      const errEl = document.getElementById('profile-error')
      errEl.style.display = 'none'
      try {
        const body = {
          name:  document.getElementById('pf-name').value.trim(),
          email: document.getElementById('pf-email').value.trim(),
          color: selectedColor,
        }
        if (avatarDataUrl) { body.avatar = avatarDataUrl; body.avatarMimeType = avatarMimeType }
        const res  = await fetch('/api/auth/profile', { method:'PATCH', headers:{'Content-Type':'application/json'}, credentials:'same-origin', body: JSON.stringify(body) })
        const data = await res.json()
        if (!res.ok) throw new Error(data.error)
        // Update local me reference so colour picker re-renders correctly
        Object.assign(me, data.user)
        const ok = document.getElementById('profile-saved')
        ok.style.display = 'inline'
        setTimeout(() => ok.style.display = 'none', 2500)
        document.getElementById('preview-name').textContent = data.user.name
        // Re-render avatar preview using the saved data (not the temp data URL)
        document.getElementById('avatar-preview').innerHTML = avatarHtml(data.user, 64)
        // Refresh the topbar avatar chip so it reflects the new photo/colour immediately
        const topbarAvatar = document.querySelector('.topbar-avatar-btn')
        if (topbarAvatar) topbarAvatar.innerHTML = avatarHtml(data.user, 28)
        avatarDataUrl = null
        document.getElementById('avatar-hint').textContent = 'Click the avatar to upload a photo'
      } catch (err) { errEl.textContent = err.message; errEl.style.display = 'flex' }
    })

    // Password strength indicator on profile new-password field
    const profilePwInput = document.getElementById('pf-new-pw')
    if (profilePwInput) {
      const profilePwIndicator = createPasswordIndicator()
      profilePwInput.parentElement.after(profilePwIndicator)
      profilePwInput.addEventListener('input', () => updatePasswordIndicator(profilePwIndicator, profilePwInput.value))
    }

    // Password save
    document.getElementById('pw-form').addEventListener('submit', async e => {
      e.preventDefault()
      const errEl = document.getElementById('pw-error')
      errEl.style.display = 'none'
      const newPw = document.getElementById('pf-new-pw').value
      const conPw = document.getElementById('pf-con-pw').value
      if (newPw !== conPw) { errEl.textContent = 'Passwords do not match.'; errEl.style.display = 'flex'; return }
      const profilePv = validatePassword(newPw); if (!profilePv.ok) { errEl.textContent = profilePv.errors.join(' '); errEl.style.display = 'flex'; return }
      try {
        const res  = await fetch('/api/auth/profile', { method:'PATCH', headers:{'Content-Type':'application/json'}, credentials:'same-origin', body: JSON.stringify({ currentPassword: document.getElementById('pf-cur-pw').value, newPassword: newPw }) })
        const data = await res.json()
        if (!res.ok) throw new Error(data.error)
        ;['pf-cur-pw','pf-new-pw','pf-con-pw'].forEach(id => document.getElementById(id).value = '')
        const ok = document.getElementById('pw-saved')
        ok.style.display = 'inline'
        setTimeout(() => ok.style.display = 'none', 2500)
      } catch (err) { errEl.textContent = err.message; errEl.style.display = 'flex' }
    })
  })()
  </script>
</body>
</html>
