<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — ForgeTrack</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/auth.css" />
  <script>!function(){var t=localStorage.getItem("ft-theme")||"system";t!=="system"&&document.documentElement.setAttribute("data-theme",t)}()</script>
</head>
<body class="auth-page">
  <div class="auth-bg"></div>

  <div class="auth-card">
    <div class="auth-logo">
      <svg width="36" height="36" viewBox="0 0 32 32" fill="none">
        <rect width="32" height="32" rx="7" fill="#0052cc"/>
        <path d="M9 22L15 9l3 5-3 3 7 5H9z" fill="white" opacity="0.9"/>
        <path d="M15 9l7 13H15l-3-5 3-3V9z" fill="white" opacity="0.55"/>
      </svg>
      <span class="auth-logo-text">ForgeTrack</span>
    </div>

    <!-- Step 1: Enter email -->
    <div class="auth-form" id="step-email">
      <h2 class="auth-heading">Reset your password</h2>
      <p class="auth-subheading">Enter your email and a reset link will be generated. An admin can share it with you, or if you have server access you can grab it directly.</p>

      <div id="form-error" class="auth-error hidden"></div>

      <div class="form-group">
        <label class="form-label" for="email">Email address</label>
        <input class="form-control" type="email" id="email" autocomplete="email" placeholder="you@example.com" autofocus />
      </div>

      <button class="btn btn-primary btn-lg auth-submit" id="submit-btn">Send Reset Link</button>
      <p class="auth-switch"><a href="/login.html">← Back to sign in</a></p>
    </div>


  </div>

  <script>
    const emailStep  = document.getElementById('step-email')
    const errorEl    = document.getElementById('form-error')
    const submitBtn  = document.getElementById('submit-btn')

    function showError(msg) { errorEl.textContent = msg; errorEl.classList.remove('hidden') }
    function hideError()    { errorEl.classList.add('hidden') }

    submitBtn.addEventListener('click', async () => {
      hideError()
      const email = document.getElementById('email').value.trim()
      if (!email) { showError('Please enter your email address.'); return }

      submitBtn.disabled = true
      submitBtn.textContent = 'Sending…'
      try {
        const res  = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        })
        const data = await res.json()
        if (!res.ok) throw new Error(data.error || 'Request failed')

        if (data.emailSent) {
          emailStep.innerHTML = `
            <div style="text-align:center;padding:8px 0">
              <div style="width:52px;height:52px;border-radius:50%;background:rgba(0,82,204,.1);display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="var(--brand)" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              </div>
              <h2 class="auth-heading" style="margin-bottom:8px">Check your inbox</h2>
              <p class="auth-subheading" style="margin-bottom:24px">If that email is registered, a reset link has been sent. It expires in 15 minutes.</p>
              <a href="/login.html" class="btn btn-primary auth-submit" style="display:block">Back to Sign In</a>
            </div>`
        } else {
          // No SMTP or email not found — always show the same message to prevent enumeration
          emailStep.innerHTML = `
            <div style="text-align:center;padding:8px 0">
              <div style="width:52px;height:52px;border-radius:50%;background:rgba(0,135,90,.12);display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="var(--green)" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
              </div>
              <h2 class="auth-heading" style="margin-bottom:8px">Request received</h2>
              <p class="auth-subheading" style="margin-bottom:24px">If that email is registered, your admin can generate a reset link from <strong>Settings → Team</strong>.</p>
              <a href="/login.html" class="btn btn-primary auth-submit" style="display:block">Back to Sign In</a>
            </div>`
        }
      } catch (err) {
        showError(err.message)
        submitBtn.disabled = false
        submitBtn.textContent = 'Send Reset Link'
      }
    })

  </script>
</body>
</html>
