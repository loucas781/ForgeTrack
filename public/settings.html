<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings — ForgeTrack</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
  <div id="app-root"></div>
  <script src="/js/app.js"></script>
  <script src="/js/shell.js"></script>
  <script>
  (async () => {
    injectShell()
    await initTopbar()
    document.title = 'Settings — ForgeTrack'
    const content = document.getElementById('page-content')
    const [config, users, projects] = await Promise.all([GET('/config'), GET('/users'), GET('/projects')])
    const me = config.user

    content.innerHTML = `
      <div class="page-pad" style="max-width:860px">
        <h1 style="margin-bottom:4px">Settings</h1>
        <p class="text-2" style="margin-bottom:32px">Application configuration and team overview</p>

        <!-- Your account -->
        <div class="card section-card">
          <h3 class="section-title">Your Account</h3>
          <div style="display:flex;align-items:center;gap:16px">
            ${avatarHtml(me, 48)}
            <div style="flex:1">
              <div style="font-weight:600;font-size:15px">${esc(me?.name)}</div>
              <div class="text-2 text-sm">${esc(me?.email)}</div>
              <div class="text-3 text-sm" style="margin-top:2px">Role: <strong style="color:var(--text-2)">${esc(me?.role)}</strong></div>
            </div>
            <a href="/profile.html" class="btn btn-secondary">
              <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              Edit Profile
            </a>
          </div>
        </div>

        <!-- Team members -->
        <div class="card section-card">
          <h3 class="section-title">Team Members (${users.length})</h3>
          <p class="text-2 text-sm" style="margin-bottom:16px">
            Everyone who has created an account on this instance.
            New members can sign up at <code style="font-size:11px;background:var(--gray-100);padding:1px 5px;border-radius:3px">/signup.html</code>.
          </p>
          ${users.map(u => `
            <div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border-2)">
              ${avatarHtml(u, 36)}
              <div style="flex:1">
                <div style="font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px">
                  ${esc(u.name)}
                  ${u.id === me?.id ? `<span class="role-badge" style="background:var(--brand-light);color:var(--brand)">you</span>` : ''}
                </div>
                <div class="text-3 text-sm">${esc(u.email)}</div>
              </div>
              <span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:2px 8px;border-radius:2px;background:var(--gray-100);color:var(--text-2)">${esc(u.role)}</span>
            </div>`).join('')}
        </div>

        <!-- App info -->
        <div class="card section-card">
          <h3 class="section-title">Application Info</h3>
          <table style="width:100%;border-collapse:collapse;font-size:13px">
            <tbody>
              ${(() => {
                const v       = config.version || '0.0.1'
                const isDev   = v.includes('-dev.')
                const isRC    = v.includes('-rc')
                const base    = v.split('-')[0]
                const devNum  = isDev ? v.split('-dev.')[1] : null
                const tag     = isDev ? `v${base}-dev.${devNum}` : isRC ? `v${base}-rc` : `v${base}`
                const ghTagUrl = `https://github.com/loucas781/ForgeTrack/releases/tag/${tag}`
                const typeColor = isDev ? 'var(--orange)' : isRC ? 'var(--brand)' : 'var(--green)'
                const typeLabel = isDev ? `dev build #${devNum}` : isRC ? 'release candidate' : 'release'
                const tdA = `padding:8px 12px;border-bottom:1px solid var(--border-2);color:var(--text-2);width:160px;vertical-align:top`
                const tdB = `padding:8px 12px;border-bottom:1px solid var(--border-2)`
                return `
                  <tr>
                    <td style="${tdA}">Version</td>
                    <td style="${tdB}">
                      <div style="display:flex;align-items:center;gap:10px">
                        <span class="mono" style="font-size:16px;font-weight:700;color:var(--text)">v${base}</span>
                        <span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:2px 8px;border-radius:10px;background:${typeColor}18;color:${typeColor};border:1px solid ${typeColor}40">${typeLabel}</span>
                      </div>
                    </td>
                  </tr>
                  <tr>
                    <td style="${tdA}">Build string</td>
                    <td style="${tdB}">
                      <span class="mono" style="font-size:12px;color:var(--text-2)">${esc(v)}</span>
                    </td>
                  </tr>
                  <tr>
                    <td style="${tdA}">Git tag</td>
                    <td style="${tdB}">
                      <a href="${ghTagUrl}" target="_blank" rel="noopener"
                         class="mono" style="font-size:12px;color:var(--brand)">${esc(tag)}</a>
                    </td>
                  </tr>`
              })()}
              <tr><td style="padding:8px 12px;border-bottom:1px solid var(--border-2);color:var(--text-2)">Environment</td><td style="padding:8px 12px;border-bottom:1px solid var(--border-2)"><span class="env-chip ${esc(config.appEnv)}">${esc(config.appEnv)}</span></td></tr>
              <tr><td style="padding:8px 12px;border-bottom:1px solid var(--border-2);color:var(--text-2)">Projects</td><td style="padding:8px 12px;border-bottom:1px solid var(--border-2)">${projects.length}</td></tr>
              <tr><td style="padding:8px 12px;border-bottom:1px solid var(--border-2);color:var(--text-2)">Team Members</td><td style="padding:8px 12px;border-bottom:1px solid var(--border-2)">${users.length}</td></tr>
              <tr><td style="padding:8px 12px;color:var(--text-2)">Database</td><td style="padding:8px 12px">SQLite</td></tr>
            </tbody>
          </table>
        </div>
      </div>`
  })()
  </script>
</body>
</html>
