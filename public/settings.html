<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings — ForgeTrack</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
  <script>!function(){var t=localStorage.getItem("ft-theme")||"system";t!=="system"&&document.documentElement.setAttribute("data-theme",t)}()</script>
  <style>
    .settings-tabs-wrap {
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border-2);
      min-width: 0;
    }
    .settings-tabs {
      display: flex; gap: 0; overflow-x: auto; scrollbar-width: none;
      padding: 0 16px;
      min-width: 0;
    }
    .settings-tabs::-webkit-scrollbar { display: none; }
    .settings-tab {
      display: flex; align-items: center; gap: 7px;
      padding: 12px 16px; background: none; border: none;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      font-family: var(--font); font-size: 13px; font-weight: 500;
      color: var(--text-2); cursor: pointer; white-space: nowrap;
      transition: color var(--t-fast), border-color var(--t-fast);
      flex-shrink: 0;
    }
    .settings-tab:hover { color: var(--text); }
    .settings-tab.active { color: var(--brand); border-bottom-color: var(--brand); }
    .settings-tab svg { width: 14px; height: 14px; flex-shrink: 0; }
    /* Mobile: replace tab bar with a select dropdown */
    .settings-mobile-select {
      display: none;
      width: calc(100% - 32px);
      margin: 10px 16px;
      padding: 9px 12px;
      background: var(--gray-50);
      border: 1px solid var(--border-2);
      border-radius: var(--r-md);
      font-family: var(--font); font-size: 14px; font-weight: 500;
      color: var(--text); cursor: pointer;
      appearance: auto;
    }
    @media (max-width: 600px) {
      .settings-tabs { display: none; }
      .settings-mobile-select { display: block; }
      .settings-tabs-wrap { border-bottom: none; }
    }
    .settings-panel { display: none; padding: 24px; max-width: 720px; }
    .settings-panel.active { display: block; }
    .section-card { margin-bottom: 20px; }
    .info-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .info-table td { padding: 10px 14px; border-bottom: 1px solid var(--border-2); }
    .info-table td:first-child { color: var(--text-2); width: 160px; }
    .info-table tr:last-child td { border-bottom: none; }
    .member-row { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border-2); flex-wrap:wrap; }
    .member-row:last-child { border-bottom: none; }
    .member-row-info { display:flex; align-items:center; gap:12px; flex:1; min-width:0; }
    .member-actions { display:flex; gap:6px; flex-wrap:wrap; width:100%; padding-top:6px; margin-left:48px; }
    .theme-options { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
    .theme-option {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      padding: 12px 16px; border: 2px solid var(--border-2); border-radius: var(--r-lg);
      background: var(--gray-50); cursor: pointer; min-width: 80px;
      transition: border-color var(--t-fast), background var(--t-fast);
    }
    .theme-option:hover { border-color: var(--brand); }
    .theme-option.active { border-color: var(--brand); background: var(--brand-light); }
    .theme-option span { font-size: 12px; font-weight: 500; color: var(--text-2); }
    .theme-option.active span { color: var(--brand); }
    .theme-swatch { width: 40px; height: 28px; border-radius: 6px; border: 1px solid var(--border); }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-bottom: 16px; }
    .stat-card { background: var(--gray-50); border: 1px solid var(--border-2); border-radius: var(--r-lg); padding: 14px; }
    .stat-val { font-size: 26px; font-weight: 700; font-family: var(--mono); color: var(--text); line-height: 1; }
    .stat-lbl { font-size: 11px; color: var(--text-3); margin-top: 4px; }
    /* 2FA */
    .twofa-status { display:flex; align-items:center; gap:10px; padding:12px 16px; background:var(--gray-50); border:1px solid var(--border-2); border-radius:var(--r-lg); margin-bottom:16px; }
    .twofa-enabled  { color: var(--green); }
    .twofa-disabled { color: var(--text-3); }
    .qr-wrap { text-align:center; padding:16px; background:var(--gray-50); border:1px solid var(--border-2); border-radius:var(--r-lg); margin-bottom:16px; }
    .qr-wrap canvas { display:inline-block; }
    /* Modal overlay for set-password */
    .modal-overlay { position:fixed;inset:0;background:rgba(9,30,66,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px; }
    .modal-box { background:var(--surface);border-radius:var(--r-xl);padding:24px;width:100%;max-width:400px;box-shadow:0 24px 80px rgba(9,30,66,.3); }
    .modal-title { font-size:16px;font-weight:700;margin-bottom:4px; }
    .modal-sub { font-size:13px;color:var(--text-2);margin-bottom:18px; }
    /* Backup panel */
    .backup-section { margin-bottom: 28px; }
    .backup-section:last-child { margin-bottom: 0; }
    .backup-section h4 { font-size: 13px; font-weight: 700; margin: 0 0 4px; }
    .backup-section p  { font-size: 12px; color: var(--text-2); margin: 0 0 14px; line-height: 1.5; }
    .backup-meta { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; margin-bottom: 16px; }
    .backup-meta-item { background: var(--gray-50); border: 1px solid var(--border-2); border-radius: var(--r-md); padding: 10px 12px; }
    .backup-meta-item .bm-val { font-size: 20px; font-weight: 700; font-family: var(--mono); color: var(--text); line-height: 1; }
    .backup-meta-item .bm-lbl { font-size: 11px; color: var(--text-3); margin-top: 3px; }
    .restore-preview { background: var(--gray-50); border: 1px solid var(--border-2); border-radius: var(--r-lg); padding: 16px; margin-bottom: 16px; }
    .restore-preview h5 { font-size: 12px; font-weight: 700; color: var(--text-2); margin: 0 0 10px; text-transform: uppercase; letter-spacing: .04em; }
    .restore-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; padding: 5px 0; border-bottom: 1px solid var(--border-2); }
    .restore-row:last-child { border-bottom: none; }
    .restore-row span:first-child { color: var(--text-2); }
    .restore-row span:last-child { font-family: var(--mono); font-weight: 600; color: var(--text); }
    .backup-drop-zone {
      border: 2px dashed var(--border); border-radius: var(--r-lg);
      padding: 32px 24px; text-align: center; cursor: pointer;
      transition: border-color var(--t-fast), background var(--t-fast);
      background: var(--gray-50);
    }
    .backup-drop-zone:hover, .backup-drop-zone.drag-over { border-color: var(--brand); background: var(--brand-light); }
    .backup-drop-zone svg { color: var(--text-3); margin-bottom: 8px; }
    .backup-drop-zone p { margin: 0; font-size: 13px; color: var(--text-2); }
    .backup-drop-zone small { font-size: 11px; color: var(--text-3); }
    .backup-progress { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--brand-light); border: 1px solid var(--brand); border-radius: var(--r-lg); font-size: 13px; color: var(--brand); }
    .backup-result-ok  { padding: 12px 16px; background: rgba(0,135,90,.08); border: 1px solid rgba(0,135,90,.3); border-radius: var(--r-lg); font-size: 13px; }
    .backup-result-err { padding: 12px 16px; background: rgba(222,53,11,.06); border: 1px solid rgba(222,53,11,.25); border-radius: var(--r-lg); font-size: 13px; color: var(--red,#de350b); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 1s linear infinite; display: inline-block; }
    .role-tabs-wrap { border-bottom: 1px solid var(--border-2); margin-bottom: 20px; }
    .role-tabs { display: flex; gap: 0; overflow-x: auto; scrollbar-width: none; }
    .role-tabs::-webkit-scrollbar { display: none; }
    .role-tab {
      display: flex; align-items: center; gap: 6px;
      padding: 9px 14px; background: none; border: none;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      font-family: var(--font); font-size: 12px; font-weight: 600;
      color: var(--text-2); cursor: pointer; white-space: nowrap;
      transition: color var(--t-fast), border-color var(--t-fast);
    }
    .role-tab:hover { color: var(--text); }
    .role-tab.active { border-bottom-color: currentColor; }
    .role-tab .role-count { font-size: 11px; font-weight: 400; opacity: .7; }
    .role-panel { display: none; }
    .role-panel.active { display: block; }
    /* Preference toggle rows */
    .pref-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--border-2); gap: 16px; }
    .pref-row:last-child { border-bottom: none; }
    .pref-row-info { flex: 1; min-width: 0; }
    .pref-row-info strong { display: block; font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .pref-row-info span { display: block; font-size: 12px; color: var(--text-3); }
    .toggle-switch { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; inset: 0; background: var(--border); border-radius: 11px; cursor: pointer; transition: background var(--t-fast); }
    .toggle-slider::before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; top: 3px; background: #fff; border-radius: 50%; transition: transform var(--t-fast); }
    .toggle-switch input:checked + .toggle-slider { background: var(--brand); }
    .toggle-switch input:checked + .toggle-slider::before { transform: translateX(18px); }
    @media (max-width: 600px) {
      .role-tabs { flex-direction: column; border-bottom: none; }
      .role-tab { border-bottom: none; border-left: 3px solid transparent; padding: 10px 14px; }
      .role-tab.active { border-left-color: currentColor; border-bottom: none; }
      .pref-row { flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div id="app-root"></div>
  <script src="/js/app.js"></script>
  <script src="/js/shell.js"></script>
  <!-- QR code library for 2FA setup -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
  (async () => {
    injectShell()
    await initTopbar()
    document.title = 'Settings — ForgeTrack'

    const [config, users, projects, issues] = await Promise.all([GET('/config'), GET('/users'), GET('/projects'), GET('/issues')])
    if (typeof APP_CONFIG !== 'undefined') Object.assign(APP_CONFIG, config)
    const me      = config.user
    const isAdmin = me?.role === 'admin'

    const ALL_TABS = [
      { id:'appearance',    label:'Appearance',    adminOnly: false, icon:'<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>' },
      { id:'team',          label:'Team',          adminOnly: false, icon:'<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>' },
      { id:'security',      label:'Security',      adminOnly: false, icon:'<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>' },
      { id:'preferences',   label:'Preferences',   adminOnly: true,  icon:'<circle cx="12" cy="12" r="3"/><path d="M19.07 4.93l-1.41 1.41M4.93 4.93l1.41 1.41M12 2v2M12 20v2M20 12h2M2 12h2M17.66 17.66l-1.41-1.41M6.34 17.66l1.41-1.41"/>' },
      { id:'backup',        label:'Backup',        adminOnly: true,  icon:'<ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4.03 3-9 3S3 13.66 3 12"/><path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/>' },
      { id:'email',         label:'Email',         adminOnly: true,  icon:'<path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>' },
      { id:'notifications', label:'Notifications', adminOnly: false, icon:'<path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/>' },
      { id:'account',       label:'Account',       adminOnly: false, icon:'<path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>' },
      { id:'build',         label:'Build Info',    adminOnly: false, icon:'<rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>' },
      { id:'about',         label:'About',         adminOnly: false, icon:'<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>' },
      { id:'audit',         label:'Audit Log',     adminOnly: true,  icon:'<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>' },
    ]
    const TABS = ALL_TABS.filter(t => !t.adminOnly || isAdmin)

    // Inject tab bar as a sibling of page-content so it doesn't scroll
    const appBody = document.querySelector('.app-body')
    const pageContent = document.getElementById('page-content')
    const tabBar = document.createElement('div')
    tabBar.className = 'settings-tabs-wrap'
    tabBar.innerHTML = `
      <div class="settings-tabs" id="settings-tabs">
        ${TABS.map((t,i) => `
          <button class="settings-tab${i===0?' active':''}" data-panel="${t.id}">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">${t.icon}</svg>
            ${t.label}
          </button>`).join('')}
      </div>
      <select class="settings-mobile-select" id="settings-mobile-select">
        ${TABS.map((t,i) => `<option value="${t.id}"${i===0?' selected':''}>${t.label}</option>`).join('')}
      </select>`
    // Insert tab bar between sidebar and page-content in app-body
    if (appBody && pageContent) {
      // Restructure: app-body → [tab-bar + page-content vertically]
      appBody.style.flexDirection = 'column'
      appBody.insertBefore(tabBar, pageContent)
    }

    const content = document.getElementById('page-content')
    const v = config.version || '0.0.1'
    const isDev = v.includes('-dev.'), isRC = v.includes('-rc')
    const base = v.split('-')[0]
    const devNum = isDev ? v.split('-dev.')[1] : null
    const tag = isDev ? `v${base}-dev.${devNum}` : isRC ? `v${base}-rc` : `v${base}`
    const vColor = isDev ? 'var(--orange)' : isRC ? 'var(--brand)' : 'var(--green)'
    const vLabel = isDev ? `dev build #${devNum}` : isRC ? 'release candidate' : 'stable release'


    content.innerHTML = `
      <div class="settings-panel active" id="panel-appearance">
        <div class="card section-card">
          <h3 class="section-title">Colour scheme</h3>
          <p class="text-2 text-sm" style="margin-bottom:16px">Choose a theme or follow your system preference. Saved to this browser.</p>
          <div class="theme-options">
            <button class="theme-option" data-theme-choice="system">
              <span class="theme-swatch" style="background:linear-gradient(135deg,#f4f5f7 50%,#1e2535 50%)"></span>
              <span>System</span>
            </button>
            <button class="theme-option" data-theme-choice="light">
              <span class="theme-swatch" style="background:#f4f5f7"></span>
              <span>Light</span>
            </button>
            <button class="theme-option" data-theme-choice="dark">
              <span class="theme-swatch" style="background:#1e2535"></span>
              <span>Dark</span>
            </button>
            <button class="theme-option" data-theme-choice="oled">
              <span class="theme-swatch" style="background:#000"></span>
              <span>OLED</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Team -->
      <div class="settings-panel" id="panel-team">
        ${isAdmin ? `
        <div class="card section-card">
          <h3 class="section-title">Invite Member</h3>
          <p class="text-2 text-sm" style="margin-bottom:16px">Create an account for a new team member. ${config.smtpEnabled ? 'An invitation email will be sent with their login details.' : 'SMTP is not configured — the temporary password will be shown here for you to share manually.'}</p>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
            <div class="form-group">
              <label class="form-label">Full name</label>
              <input class="form-control" id="invite-name" placeholder="Jane Smith" />
            </div>
            <div class="form-group">
              <label class="form-label">Email</label>
              <input class="form-control" id="invite-email" type="email" placeholder="jane@company.com" />
            </div>
            <div class="form-group">
              <label class="form-label">Role</label>
              <select class="form-control" id="invite-role">
                <option value="member">Member</option>
                <option value="engineer">Engineer</option>
                <option value="lead">Project Lead</option>
                <option value="admin">Admin</option>
              </select>
            </div>
          </div>
          <button class="btn btn-primary" id="invite-btn" style="margin-top:4px">Create Account</button>
          <div id="invite-result" style="display:none;margin-top:12px;padding:12px 14px;border-radius:var(--r-md);font-size:13px"></div>
        </div>` : ''}
        <div class="card section-card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
            <h3 class="section-title" style="margin:0">Team Members (${users.length})</h3>
            ${config.allowSignup ? `<span class="text-3 text-sm">Open signup: <a href="/signup.html" style="color:var(--brand)">/signup.html</a></span>` : `<span style="font-size:11px;padding:2px 8px;border-radius:10px;background:rgba(222,53,11,.08);color:var(--red,#de350b);border:1px solid rgba(222,53,11,.2);font-weight:600">Signup disabled</span>`}
          </div>
          ${(function() {
            // Helper to render a single member row
            function memberRow(u) {
              return `
                <div class="member-row" id="member-row-${u.id}">
                  <div class="member-row-info">
                    ${avatarHtml(u, 36)}
                    <div style="flex:1;min-width:0">
                      <div style="font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                        ${esc(u.name)}
                        ${u.id === me?.id ? `<span class="role-badge">you</span>` : ''}
                        ${!u.is_active ? `<span style="font-size:11px;padding:1px 7px;border-radius:10px;background:rgba(222,53,11,.08);color:var(--red,#de350b);border:1px solid rgba(222,53,11,.2);font-weight:600">inactive</span>` : ''}
                      </div>
                      <div class="text-3 text-sm" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(u.email)}</div>
                    </div>
                  </div>
                  ${isAdmin && u.id !== me?.id ? `
                  <div class="member-actions">
                    <button class="btn btn-sm" onclick="changeRoleModal('${u.id}','${esc(u.name)}','${u.role}')">Change Role</button>
                    <button class="btn btn-sm" onclick="setPasswordModal('${u.id}','${esc(u.name)}')">Set Password</button>
                    <button class="btn btn-sm" onclick="getResetLink('${u.id}','${esc(u.name)}')">Reset Link</button>
                    ${u.is_active
                      ? `<button class="btn btn-sm" style="color:var(--orange)" onclick="toggleActive('${u.id}', false)">Deactivate</button>`
                      : `<button class="btn btn-sm" style="color:var(--green)" onclick="toggleActive('${u.id}', true)">Reactivate</button>`
                    }
                    <button class="btn btn-sm" style="color:var(--red,#de350b)" onclick="deleteUser('${u.id}','${esc(u.name)}')">Delete</button>
                  </div>` : ''}
                </div>`
            }

            // Role group definitions
            const ROLE_GROUPS = [
              { role: 'admin',    label: 'Administrators',  desc: 'Full access to all settings and projects',                     color: 'var(--brand)',         bg: 'rgba(0,82,204,.08)',   icon: '<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>' },
              { role: 'lead',     label: 'Project Leads',   desc: 'Manage projects and issues in projects they lead',             color: '#6554c0',              bg: 'rgba(101,84,192,.08)', icon: '<circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 10-16 0"/><path d="M12 12l2 4-2 1-2-1 2-4z"/>' },
              { role: 'engineer', label: 'Engineers',       desc: 'Create and work on issues, claim and reassign tickets',        color: 'var(--green,#00875a)', bg: 'rgba(0,135,90,.08)',  icon: '<polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>' },
              { role: 'member',   label: 'Members',         desc: 'View projects, create issues and leave comments',              color: 'var(--text-2)',        bg: 'var(--gray-100)',      icon: '<path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>' },
            ]

            // Build sub-tab UI
            const populated = ROLE_GROUPS.filter(g => users.some(u => u.role === g.role))

            let tabsHtml = `<div class="role-tabs-wrap"><div class="role-tabs">`
            populated.forEach((group, i) => {
              const count = users.filter(u => u.role === group.role).length
              tabsHtml += `
                <button class="role-tab${i===0?' active':''}" style="color:${group.color}" data-role="${group.role}"
                  onclick="switchRoleTab('${group.role}')">
                  <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">${group.icon}</svg>
                  ${group.label} <span class="role-count">(${count})</span>
                </button>`
            })
            tabsHtml += `</div></div>`

            let panelsHtml = ''
            populated.forEach((group, i) => {
              const groupUsers = users.filter(u => u.role === group.role)
              panelsHtml += `
                <div class="role-panel${i===0?' active':''}" id="role-panel-${group.role}">

    window.switchRoleTab = function(role) {

      document.querySelectorAll('.role-panel').forEach(p => p.classList.toggle('active', p.id === 'role-panel-' + role))

    function switchTab(id) {
      tabBar.querySelectorAll('.settings-tab').forEach(b => b.classList.toggle('active', b.dataset.panel === id))
      document.querySelectorAll('.settings-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + id))

      if (sel) sel.value = id
      history.replaceState(null, '', '#' + id)
      if (id === 'security')      { renderHTTPS(); renderTwoFA(); if (isAdmin) renderPasswordPolicy() }
      if (id === 'notifications') { renderNotifications() }
      if (id === 'account')       { renderAccount() }
      if (id === 'email')         { renderEmail() }
      if (id === 'team')          { wireInvite() }
      if (id === 'audit')         { renderAudit() }
      if (id === 'preferences')   { renderPreferences() }
      if (id === 'backup')        { renderBackup() }
    }

    // ── Admin: toggle active / delete / set password (Team tab) ──────────────
    async function toggleActive(userId, activate) {
      try {
        const res = await PATCH('/users/' + userId, { is_active: activate })
        if (!res.ok) return alert(res.error || 'Failed to update account.')
        location.reload()
      } catch { alert('Something went wrong.') }
    }

    async function deleteUser(userId, name) {
      if (!confirm(`Permanently delete ${name}? This cannot be undone. Their issues will be unassigned.`)) return
      try {
        const res = await DELETE('/users/' + userId)
        if (!res.ok) return alert(res.error || 'Failed to delete user.')
        document.getElementById('member-row-' + userId)?.remove()
      } catch { alert('Something went wrong.') }
    }

    function setPasswordModal(userId, name) {
      const existing = document.getElementById('set-pw-modal')
      if (existing) existing.remove()
      const policy = getPolicy()
      const minLen = policy.minLength || 12
      const modal = document.createElement('div')
      modal.className = 'modal-overlay'
      modal.id = 'set-pw-modal'
      modal.innerHTML = `
        <div class="modal-box">
          <div class="modal-title">Set Password</div>
          <div class="modal-sub">Set a new password for <strong>${esc(name)}</strong>. They should change it on next login.</div>
          <div class="form-group" style="margin-bottom:12px">
            <label class="form-label">New password</label>
            <input class="form-control" id="set-pw-input" type="password" placeholder="At least ${minLen} characters" autocomplete="new-password" />
          </div>
          <div id="set-pw-error" style="display:none;color:var(--red,#de350b);font-size:13px;margin-bottom:10px"></div>
          <div style="display:flex;gap:8px;justify-content:flex-end">
            <button class="btn" id="set-pw-cancel">Cancel</button>
            <button class="btn btn-primary" id="set-pw-confirm">Set Password</button>
          </div>
        </div>`
      document.body.appendChild(modal)
      const setPwInput = document.getElementById('set-pw-input')
      setPwInput.focus()
      const setPwIndicator = createPasswordIndicator()
      setPwInput.parentElement.after(setPwIndicator)
      setPwInput.addEventListener('input', () => updatePasswordIndicator(setPwIndicator, setPwInput.value))
      document.getElementById('set-pw-cancel').addEventListener('click', () => modal.remove())
      modal.addEventListener('click', e => { if (e.target === modal) modal.remove() })
      document.getElementById('set-pw-confirm').addEventListener('click', async () => {
        const pw = document.getElementById('set-pw-input').value
        const errEl = document.getElementById('set-pw-error')
        const modalPv = validatePassword(pw); if (!modalPv.ok) { errEl.textContent = modalPv.errors.join(' '); errEl.style.display = ''; return }
        errEl.style.display = 'none'
        document.getElementById('set-pw-confirm').disabled = true
        try {
          const res = await POST('/users/' + userId + '/set-password', { password: pw })
          if (!res.ok) { errEl.textContent = res.error || 'Failed to set password.'; errEl.style.display = ''; document.getElementById('set-pw-confirm').disabled = false; return }
          modal.remove()
        } catch { errEl.textContent = 'Something went wrong.'; errEl.style.display = ''; document.getElementById('set-pw-confirm').disabled = false }
      })
    }

    window.deleteUser       = deleteUser
    window.setPasswordModal = setPasswordModal
    window.changeRoleModal  = changeRoleModal
    window.getResetLink     = getResetLink

    async function getResetLink(userId, name) {
      const existing = document.getElementById('reset-link-modal')
      if (existing) existing.remove()
      const modal = document.createElement('div')
      modal.className = 'modal-overlay'
      modal.id = 'reset-link-modal'
      modal.innerHTML = `
        <div class="modal-box">
          <div class="modal-title">Password Reset Link</div>
          <div class="modal-sub">Generating a secure reset link for <strong>${esc(name)}</strong>. The link expires in <strong>15 minutes</strong>.</div>
          <div id="reset-link-result" style="margin:14px 0;font-size:13px;color:var(--text-2)">Loading…</div>
          <div style="display:flex;gap:8px;justify-content:flex-end">
            <button class="btn" id="reset-link-close">Close</button>
            <button class="btn btn-primary" id="reset-link-copy" style="display:none">Copy Link</button>
          </div>
        </div>`
      document.body.appendChild(modal)
      modal.addEventListener('click', e => { if (e.target === modal) modal.remove() })
      document.getElementById('reset-link-close').addEventListener('click', () => modal.remove())
      try {
        const res = await GET('/auth/admin/reset-link/' + userId)
        if (!res.ok) throw new Error(res.error || 'Failed')
        const resultEl = document.getElementById('reset-link-result')
        resultEl.innerHTML = `
          <div style="background:var(--gray-50);border:1px solid var(--border-2);border-radius:var(--r-md);padding:10px;word-break:break-all;font-family:monospace;font-size:12px;user-select:all">${esc(res.resetUrl)}</div>
          <div style="margin-top:8px;font-size:12px;color:var(--orange)">⚠ Share this link securely. It expires in 15 minutes and can only be used once.</div>`
        const copyBtn = document.getElementById('reset-link-copy')
        copyBtn.style.display = ''
        copyBtn.addEventListener('click', () => {
          navigator.clipboard.writeText(res.resetUrl).then(() => { copyBtn.textContent = 'Copied!'; setTimeout(() => copyBtn.textContent = 'Copy Link', 2000) })
        })
      } catch (err) {
        document.getElementById('reset-link-result').innerHTML = `<span style="color:var(--red)">${esc(err.message)}</span>`
      }
    }

    function changeRoleModal(userId, name, currentRole) {
      const existing = document.getElementById('change-role-modal')
      if (existing) existing.remove()
      const ROLE_LABELS = { member: 'Member', engineer: 'Engineer', lead: 'Project Lead', admin: 'Admin' }
      const modal = document.createElement('div')
      modal.className = 'modal-overlay'
      modal.id = 'change-role-modal'
      modal.innerHTML = `
        <div class="modal-box">
          <div class="modal-title">Change Role</div>
          <div class="modal-sub">Set a new role for <strong>${esc(name)}</strong>.</div>
          <div class="form-group" style="margin-bottom:12px">
            <label class="form-label">Role</label>
            <select class="form-control" id="change-role-select">
              <option value="member"${currentRole==='member'?' selected':''}>Member — can view projects, create &amp; comment on issues</option>
              <option value="engineer"${currentRole==='engineer'?' selected':''}>Engineer — create & work issues, claim unassigned tickets, reassign to self</option>
              <option value="lead"${currentRole==='lead'?' selected':''}>Project Lead — can create projects and manage issues in projects they lead</option>
              <option value="admin"${currentRole==='admin'?' selected':''}>Admin — full access to everything</option>
            </select>
          </div>
          <div id="change-role-error" style="display:none;color:var(--red,#de350b);font-size:13px;margin-bottom:10px"></div>
          <div style="display:flex;gap:8px;justify-content:flex-end">
            <button class="btn" id="change-role-cancel">Cancel</button>
            <button class="btn btn-primary" id="change-role-confirm">Save</button>
          </div>
        </div>`
      document.body.appendChild(modal)
      document.getElementById('change-role-cancel').addEventListener('click', () => modal.remove())
      modal.addEventListener('click', e => { if (e.target === modal) modal.remove() })
      document.getElementById('change-role-confirm').addEventListener('click', async () => {
        const newRole = document.getElementById('change-role-select').value
        const errEl   = document.getElementById('change-role-error')
        if (newRole === currentRole) { modal.remove(); return }
        errEl.style.display = 'none'
        document.getElementById('change-role-confirm').disabled = true
        try {
          const res = await PATCH('/users/' + userId, { role: newRole })
          if (!res.ok) { errEl.textContent = res.error || 'Failed to change role.'; errEl.style.display = ''; document.getElementById('change-role-confirm').disabled = false; return }
          modal.remove()
          location.reload()
        } catch { errEl.textContent = 'Something went wrong.'; errEl.style.display = ''; document.getElementById('change-role-confirm').disabled = false }
      })
    }

    // ── Invite member (Team tab) ───────────────────────────────────
    function wireInvite() {
      const btn = document.getElementById('invite-btn')
      if (!btn || btn.dataset.wired) return
      btn.dataset.wired = '1'
      btn.addEventListener('click', async () => {
        const name  = document.getElementById('invite-name').value.trim()
        const email = document.getElementById('invite-email').value.trim()
        const role  = document.getElementById('invite-role').value
        const res   = document.getElementById('invite-result')
        if (!name || !email) { toast('Please fill in name and email', 'error'); return }
        btn.disabled = true; btn.textContent = 'Creating…'
        try {
          const data = await POST('/auth/invite', { name, email, role, sendEmail: true })
          res.style.cssText = 'display:block;margin-top:12px;padding:12px 14px;border-radius:var(--r-md);font-size:13px;background:rgba(0,135,90,.08);border:1px solid rgba(0,135,90,.25);color:var(--text-1)'
          if (data.emailSent) {
            res.innerHTML = `✓ Account created and invitation email sent to <strong>${email}</strong>.`
          } else {
            res.innerHTML = `✓ Account created for <strong>${name}</strong>.<br>
              <span class="text-2">Email not sent (SMTP not configured). Temporary password:</span><br>
              <code style="font-family:var(--mono);font-size:13px;background:var(--gray-100);padding:4px 8px;border-radius:4px;display:inline-block;margin-top:6px">${data.tempPassword}</code><br>
              <span class="text-3 text-sm" style="margin-top:4px;display:block">Share this with the user and ask them to change it after signing in.</span>`
          }
          document.getElementById('invite-name').value = ''
          document.getElementById('invite-email').value = ''
        } catch (err) {
          res.style.cssText = 'display:block;margin-top:12px;padding:12px 14px;border-radius:var(--r-md);font-size:13px;background:rgba(222,53,11,.06);border:1px solid rgba(222,53,11,.2);color:var(--red,#de350b)'
          res.textContent = err.message
        }
        btn.disabled = false; btn.textContent = 'Create Account'
      })
    }

    // ── Theme picker ───────────────────────────────────────────────
    function updateThemeUI(choice) {
      document.querySelectorAll('.theme-option').forEach(o => o.classList.toggle('active', o.dataset.themeChoice === choice))

        localStorage.setItem('ft-theme', choice)

        html.classList.add('theme-transitioning')
        setTimeout(() => html.classList.remove('theme-transitioning'), 400)

        document.querySelectorAll('.theme-picker-item').forEach(i => i.classList.toggle('active', i.dataset.themeChoice === choice))

    function renderNotifications() {
      const prefs = JSON.parse(localStorage.getItem(NOTIF_PREFS_KEY) || '{}')
      const rows  = document.getElementById('notif-rows')
      const digestRows = document.getElementById('digest-rows')
      if (!rows || rows.dataset.rendered) return
      rows.dataset.rendered = '1'

      NOTIF_OPTIONS.slice(0, -1).forEach(opt => {
        const on = prefs[opt.key] !== undefined ? prefs[opt.key] : opt.defaultOn
        rows.insertAdjacentHTML('beforeend', `
          <label style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-radius:var(--r-md);cursor:pointer;background:var(--gray-50);border:1px solid var(--border-2)">
            <span style="font-size:13px">${opt.label}</span>

          </label>`)
      })

      const digestOn  = prefs[digestOpt.key] !== undefined ? prefs[digestOpt.key] : digestOpt.defaultOn

          <span style="font-size:13px">${digestOpt.label}</span>

    // ── Account panel ──────────────────────────────────────────────
    function renderAccount() {
      const area = document.getElementById('delete-account-area')
      if (area.dataset.rendered) return
      area.dataset.rendered = '1'

      // Populate session browser info
      const ua = navigator.userAgent
      const browserName = ua.includes('Firefox') ? 'Firefox' : ua.includes('Edg') ? 'Edge' : ua.includes('Chrome') ? 'Chrome' : ua.includes('Safari') ? 'Safari' : 'Unknown browser'
      const osName = ua.includes('Win') ? 'Windows' : ua.includes('Mac') ? 'macOS' : ua.includes('Linux') ? 'Linux' : ua.includes('iPhone') || ua.includes('iPad') ? 'iOS' : ua.includes('Android') ? 'Android' : ''
      document.getElementById('session-browser-info').textContent = `${browserName}${osName ? ' on ' + osName : ''}`

      // Sign out everywhere
      document.getElementById('sign-out-all-btn').addEventListener('click', async () => {
        if (!confirm('Sign out of all sessions?\n\nYou will be redirected to the login page.')) return
        await fetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin' })
        window.location.href = '/login.html'
      })

      // Export data
      document.getElementById('export-data-btn').addEventListener('click', async () => {
        const btn = document.getElementById('export-data-btn')
        btn.textContent = 'Preparing…'
        btn.disabled = true
        try {
          const [me, myIssues, projects] = await Promise.all([
            GET('/auth/me'), GET('/issues'), GET('/projects')
          ])
          const created  = myIssues.filter(i => i.creator_id === me.id || i.created_by === me.id)
          const assigned = myIssues.filter(i => i.assignee_id === me.id)
          const export_data = {
            exported_at: new Date().toISOString(),
            account: { id: me.id, name: me.name, email: me.email, role: me.role, created_at: me.created_at },
            issues_created: created,
            issues_assigned: assigned,
            projects_member_count: projects.length,
          }
          const blob = new Blob([JSON.stringify(export_data, null, 2)], { type: 'application/json' })
          const url  = URL.createObjectURL(blob)
          const a    = document.createElement('a')
          a.href = url; a.download = `forgetrack-export-${me.name.replace(/\s+/g,'-').toLowerCase()}-${Date.now()}.json`
          a.click()
          URL.revokeObjectURL(url)
        } catch (err) { toast(err.message, 'error') }
        finally { btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="margin-right:6px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>Download my data'; btn.disabled = false }
      })

      // Delete account
      document.getElementById('delete-account-btn').addEventListener('click', () => {
        area.innerHTML = `
          <div style="background:rgba(222,53,11,.05);border:1px solid rgba(222,53,11,.2);border-radius:var(--r-lg);padding:16px">
            <p style="font-size:13px;font-weight:600;color:var(--red,#de350b);margin:0 0 6px">This will permanently delete your account.</p>
            <p class="text-2 text-sm" style="margin:0 0 14px">Type <strong>DELETE</strong> to confirm.</p>
            <input class="form-control" type="text" id="delete-confirm-input" placeholder="DELETE" style="max-width:200px;margin-bottom:12px" />
            <div id="delete-account-err" style="color:var(--red,#de350b);font-size:13px;display:none;margin-bottom:10px"></div>
            <div style="display:flex;gap:10px">
              <button class="btn btn-danger" id="confirm-delete-btn">Delete my account</button>
              <button class="btn btn-secondary" id="cancel-delete-btn">Cancel</button>
            </div>
          </div>`

        document.getElementById('cancel-delete-btn').addEventListener('click', () => {
          area.innerHTML = '<button class="btn btn-danger" id="delete-account-btn">Delete my account</button>'
          area.dataset.rendered = ''
          renderAccount()
        })

        document.getElementById('confirm-delete-btn').addEventListener('click', async () => {
          const val = document.getElementById('delete-confirm-input').value.trim()
          const err = document.getElementById('delete-account-err')
          if (val !== 'DELETE') { err.textContent = 'Please type DELETE exactly.'; err.style.display = 'block'; return }
          const btn = document.getElementById('confirm-delete-btn')
          btn.disabled = true; btn.textContent = 'Deleting…'
          try {
            const res  = await fetch('/api/auth/account', { method: 'DELETE', credentials: 'same-origin' })
            const data = await res.json()
            if (!res.ok) throw new Error(data.error)
            window.location.href = '/login.html?deleted=1'
          } catch (e) { err.textContent = e.message; err.style.display = 'block'; btn.disabled = false; btn.textContent = 'Delete my account' }
        })
      })
    }

    // ── Email / SMTP settings (admin only) ────────────────────────
    async function renderEmail() {
      const area = document.getElementById('email-config-area')
      if (!area || area.dataset.rendered) return
      area.dataset.rendered = '1'

      if (me?.role !== 'admin') {
        area.style.display = 'none'
        document.getElementById('email-admin-only-notice').style.display = ''
        return
      }

      let cfg
      try { cfg = await GET('/config/email') } catch { return }

      // Populate fields
      document.getElementById('smtp-host').value      = cfg.smtpHost
      document.getElementById('smtp-port').value      = cfg.smtpPort || '587'
      document.getElementById('smtp-secure').checked  = cfg.smtpSecure
      document.getElementById('smtp-user').value      = cfg.smtpUser
      document.getElementById('smtp-pass').value      = cfg.hasPassword ? '••••••••' : ''
      document.getElementById('smtp-from-name').value = cfg.smtpFromName
      document.getElementById('smtp-from-addr').value = cfg.smtpFromAddr

      const allowToggle = document.getElementById('allow-signup-toggle')
      const allowLabel  = document.getElementById('allow-signup-label')
      allowToggle.checked = cfg.allowSignup
      allowLabel.textContent = cfg.allowSignup ? 'Enabled' : 'Disabled'

      // Show connection status
      const statusBar = document.getElementById('smtp-status-bar')
      if (cfg.enabled) {
        statusBar.style.cssText = 'display:flex;padding:10px 14px;border-radius:var(--r-md);font-size:13px;margin-bottom:16px;align-items:center;gap:8px;background:rgba(0,135,90,.08);border:1px solid rgba(0,135,90,.25);color:var(--text-1)'
        statusBar.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="var(--green)" stroke-width="2" viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg> SMTP configured — password reset and invite emails are active.'
      } else {
        statusBar.style.cssText = 'display:flex;padding:10px 14px;border-radius:var(--r-md);font-size:13px;margin-bottom:16px;align-items:center;gap:8px;background:var(--gray-50);border:1px solid var(--border-2);color:var(--text-2)'
        statusBar.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg> No SMTP configured. Password reset links are shown on screen instead of emailed.'
      }

      // Password show/hide
      document.getElementById('smtp-pw-toggle').addEventListener('click', () => {
        const inp = document.getElementById('smtp-pass')
        if (inp.value === '••••••••') { inp.value = ''; inp.type = 'text'; return }
        inp.type = inp.type === 'text' ? 'password' : 'text'
      })

      // Allow signup toggle
      allowToggle.addEventListener('change', async () => {
        allowLabel.textContent = allowToggle.checked ? 'Enabled' : 'Disabled'
        try {
          await PATCH('/config/email', { allowSignup: allowToggle.checked })
          toast(`Open signup ${allowToggle.checked ? 'enabled' : 'disabled'}`, 'success')
        } catch (err) { toast(err.message, 'error') }
      })

      // Save SMTP
      document.getElementById('save-smtp-btn').addEventListener('click', async () => {
        const saveBtn = document.getElementById('save-smtp-btn')
        const msg     = document.getElementById('smtp-save-msg')
        saveBtn.disabled = true; saveBtn.textContent = 'Saving…'
        const pass = document.getElementById('smtp-pass').value
        try {
          await PATCH('/config/email', {
            smtpHost:     document.getElementById('smtp-host').value.trim(),
            smtpPort:     document.getElementById('smtp-port').value,
            smtpSecure:   document.getElementById('smtp-secure').checked,
            smtpUser:     document.getElementById('smtp-user').value.trim(),
            smtpPass:     pass === '••••••••' ? undefined : pass,
            smtpFromName: document.getElementById('smtp-from-name').value.trim(),
            smtpFromAddr: document.getElementById('smtp-from-addr').value.trim(),
          })
          msg.style.cssText = 'display:block;margin-top:10px;font-size:13px;color:var(--green)'
          msg.textContent = '✓ SMTP configuration saved.'
          setTimeout(() => msg.style.display = 'none', 3000)
          area.dataset.rendered = ''   // force re-render to refresh status bar
        } catch (err) {
          msg.style.cssText = 'display:block;margin-top:10px;font-size:13px;color:var(--red,#de350b)'
          msg.textContent = err.message
        }
        saveBtn.disabled = false; saveBtn.textContent = 'Save'
      })

      // Test SMTP
      document.getElementById('test-smtp-btn').addEventListener('click', async () => {
        const testBtn = document.getElementById('test-smtp-btn')
        const msg     = document.getElementById('smtp-save-msg')
        testBtn.disabled = true; testBtn.textContent = 'Sending…'
        try {
          const data = await POST('/config/email/test', {})
          msg.style.cssText = 'display:block;margin-top:10px;font-size:13px;color:var(--green)'
          msg.textContent = `✓ Test email sent to ${data.sentTo}.`
        } catch (err) {
          msg.style.cssText = 'display:block;margin-top:10px;font-size:13px;color:var(--red,#de350b)'
          msg.textContent = `✗ ${err.message}`
        }
        testBtn.disabled = false; testBtn.textContent = 'Send Test Email'
        setTimeout(() => msg.style.display = 'none', 5000)
      })

      // Clear SMTP
      document.getElementById('clear-smtp-btn').addEventListener('click', async () => {
        if (!confirm('Clear all SMTP configuration? Password reset emails will stop working.')) return
        await PATCH('/config/email', { smtpHost: '', smtpUser: '', smtpPass: '', smtpFromName: '', smtpFromAddr: '' })
        area.dataset.rendered = ''
        renderEmail()
        toast('SMTP configuration cleared', 'success')
      })
    }

    // ── HTTPS / Cookie Secure toggle (admin only) ───────────────────
    async function renderPasswordPolicy() {
      const card = document.getElementById('pw-policy-card')

      const pol = APP_CONFIG?.passwordPolicy || {}

      function policyToggleRow(key, label, desc) {
        const checked = pol[key] !== false
        return `

              <span style="position:absolute;top:3px;left:${checked ? '21px' : '3px'};width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.3);transition:left .2s"></span>

      }

      card.innerHTML = `
        <h3 class="section-title">Password Policy</h3>
        <p class="text-2 text-sm" style="margin-bottom:16px">
          Rules enforced when any user sets or changes their password. Changes take effect immediately — existing passwords are not affected.
        </p>
        <div style="margin-bottom:16px">
          <label class="form-label" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
            Minimum length
            <span class="text-3 text-sm">Currently: ${pol.minLength ?? 12} characters</span>
          </label>
          <input type="number" id="pol-minLength" min="6" max="128" value="${pol.minLength ?? 12}"
            class="form-control" style="max-width:120px" />
        </div>
        <div style="margin-bottom:4px">
          ${policyToggleRow('requireUpper',   'Uppercase letter',         'Must contain at least one A–Z character.')}
          ${policyToggleRow('requireLower',   'Lowercase letter',         'Must contain at least one a–z character.')}
          ${policyToggleRow('requireNumber',  'Number',                   'Must contain at least one digit 0–9.')}
          ${policyToggleRow('requireSpecial', 'Special character',        'Must contain at least one symbol e.g. !@#$%^&*.')}
          ${policyToggleRow('noSequential',   'No sequential characters', 'Blocks patterns like aaa, 111, abc, 123.')}
        </div>
        <div id="pol-status" style="min-height:20px;margin-top:12px;font-size:13px"></div>
        <div style="margin-top:14px">
          <button class="btn btn-primary" id="pol-save">Save Policy</button>

      // Wire toggles — live preview via knob movement
      card.querySelectorAll('input[type=checkbox][data-pol]').forEach(cb => {
        cb.addEventListener('change', () => {
          const track = cb.nextElementSibling
          const knob  = track.nextElementSibling
          track.style.background = cb.checked ? 'var(--brand)' : 'var(--gray-300)'
          knob.style.left = cb.checked ? '21px' : '3px'
        })
      })

      document.getElementById('pol-save').addEventListener('click', async () => {
        const body = { minLength: parseInt(document.getElementById('pol-minLength').value) }
        card.querySelectorAll('input[type=checkbox][data-pol]').forEach(cb => {
          body[cb.dataset.pol] = cb.checked
        })
        const statusEl = document.getElementById('pol-status')
        statusEl.textContent = 'Saving…'
        try {
          const res = await PATCH('/config/password-policy', body)
          if (!res.ok) throw new Error(res.error || 'Failed')
          // Update local config so the indicator in the same session reflects changes
          if (APP_CONFIG) APP_CONFIG.passwordPolicy = res.passwordPolicy
          statusEl.style.color = 'var(--green)'
          statusEl.textContent = '✓ Policy saved.'
          setTimeout(() => statusEl.textContent = '', 3000)
        } catch (err) {
          statusEl.style.color = 'var(--red)'
          statusEl.textContent = err.message
        }
      })
    }

    async function renderHTTPS() {
      const card = document.getElementById('https-toggle-card')
      if (!card) return
      const cfg = await GET('/config')
      if (cfg.user?.role !== 'admin') { card.style.display = 'none'; return }

      card.innerHTML = `
        <h3 class="section-title">HTTPS / Reverse Proxy</h3>
        <p class="text-2 text-sm" style="margin-bottom:16px">
          Configure these once you are running behind a reverse proxy (e.g. Nginx Proxy Manager) with a valid SSL certificate.
          <strong>Do not enable Secure Cookies on plain HTTP — it will lock everyone out.</strong>
        </p>

        <div style="display:flex;flex-direction:column;gap:10px">
          <!-- Secure cookies row -->
          <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--gray-50);border:1px solid var(--border-2);border-radius:var(--r-lg)">
            <div>
              <div style="font-weight:600;font-size:13px">Secure Cookies</div>
              <div class="text-2 text-sm" id="cookie-status-text"></div>
            </div>

          <!-- Trust proxy row -->
          <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--gray-50);border:1px solid var(--border-2);border-radius:var(--r-lg)">
            <div>
              <div style="font-weight:600;font-size:13px">Trust Reverse Proxy</div>
              <div class="text-2 text-sm" id="proxy-status-text"></div>
            </div>
            <button class="btn btn-sm" id="proxy-toggle-btn" style="min-width:80px">…</button>
          </div>
        </div>

        <div id="https-warning-bar" style="display:none;margin-top:12px;padding:10px 14px;border-radius:var(--r-md);font-size:12px;display:flex;gap:8px;align-items:flex-start">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
          <span id="https-warning-text"></span>
        </div>`

      let cookieSecure = cfg.cookieSecure
      let trustProxy   = cfg.trustProxy

      function updateCookieUI() {
        const btn  = document.getElementById('cookie-toggle-btn')
        const text = document.getElementById('cookie-status-text')
        btn.textContent = cookieSecure ? 'Disable' : 'Enable'
        btn.className   = `btn btn-sm ${cookieSecure ? 'btn-danger' : 'btn-primary'}`
        text.textContent = cookieSecure ? '🔒 Enabled — HTTPS only' : '⚠️ Disabled — HTTP allowed'
        text.style.color = cookieSecure ? 'var(--green)' : 'var(--orange)'
      }

      function updateProxyUI() {
        const btn  = document.getElementById('proxy-toggle-btn')
        const text = document.getElementById('proxy-status-text')
        btn.textContent = trustProxy ? 'Disable' : 'Enable'
        btn.className   = `btn btn-sm ${trustProxy ? 'btn-danger' : 'btn-primary'}`
        text.textContent = trustProxy
          ? '✓ Enabled — requires server restart to take effect'
          : '✗ Disabled — enable when behind Nginx/Caddy etc.'
        text.style.color = trustProxy ? 'var(--green)' : 'var(--text-3)'
      }

      updateCookieUI()
      updateProxyUI()

      document.getElementById('cookie-toggle-btn').addEventListener('click', async () => {
        const action = cookieSecure ? 'disable' : 'enable'
        if (!confirm(`${action === 'enable' ? 'Only enable secure cookies if HTTPS is fully working.\n\nEnabling on plain HTTP will lock everyone out.' : 'Disable secure cookies?\n\nCookies will be sent over HTTP.'}`)) return
        try {
          const result = await PATCH('/config', { cookieSecure: !cookieSecure })
          cookieSecure = result.cookieSecure
          updateCookieUI()
          toast(`Secure cookies ${cookieSecure ? 'enabled' : 'disabled'}`, 'success')
        } catch (err) { toast(err.message, 'error') }
      })

      document.getElementById('proxy-toggle-btn').addEventListener('click', async () => {
        if (!confirm(`${trustProxy ? 'Disable' : 'Enable'} reverse proxy trust?\n\nThis requires a server restart to take effect.`)) return
        try {
          const result = await PATCH('/config', { trustProxy: !trustProxy })
          trustProxy = result.trustProxy
          updateProxyUI()
          const bar  = document.getElementById('https-warning-bar')
          const text = document.getElementById('https-warning-text')
          bar.style.cssText = 'display:flex;margin-top:12px;padding:10px 14px;border-radius:var(--r-md);font-size:12px;gap:8px;align-items:flex-start;background:rgba(255,153,0,.08);border:1px solid rgba(255,153,0,.3);color:var(--text-1)'
          text.textContent = 'Restart the ForgeTrack service for the proxy change to take effect: systemctl restart forgetrack'
        } catch (err) { toast(err.message, 'error') }
      })
    }

              area.innerHTML = `
                <p class="text-2 text-sm" style="margin-bottom:12px">

                </div>
                <div class="form-group">

                  <input class="form-control" type="text" inputmode="numeric" id="verify-2fa-code" placeholder="000000" maxlength="6" style="max-width:160px" />

    let auditOffset = 0

    async function renderAudit() {
      const wrap    = document.getElementById('audit-table-wrap')
      const countEl = document.getElementById('audit-count')
      const prevBtn = document.getElementById('audit-prev')
      const nextBtn = document.getElementById('audit-next')
      if (!wrap) return

      // Wire filters and pagination once
      if (!document.getElementById('audit-filter-action')?.dataset.wired) {
        const wireFilter = () => { auditOffset = 0; renderAudit() }
        document.getElementById('audit-filter-action')?.addEventListener('change', wireFilter)
        document.getElementById('audit-filter-actor')?.addEventListener('change', wireFilter)
        document.getElementById('audit-refresh-btn')?.addEventListener('click', wireFilter)
        document.getElementById('audit-prev')?.addEventListener('click', () => { auditOffset = Math.max(0, auditOffset - AUDIT_PAGE); renderAudit() })
        document.getElementById('audit-next')?.addEventListener('click', () => { auditOffset += AUDIT_PAGE; renderAudit() })
        document.getElementById('audit-filter-action').dataset.wired = '1'
      }

      const action = document.getElementById('audit-filter-action')?.value || ''
      const actor  = document.getElementById('audit-filter-actor')?.value  || ''
      const qs     = new URLSearchParams({ limit: AUDIT_PAGE, offset: auditOffset, ...(action && {action}), ...(actor && {actor}) })

      wrap.innerHTML = `<div style="text-align:center;padding:32px;color:var(--text-3);font-size:13px">Loading…</div>`
      try {
        const data = await GET('/audit?' + qs)
        if (!data.entries.length) {
          wrap.innerHTML = `<div style="text-align:center;padding:40px;color:var(--text-3);font-size:13px">No audit entries found.</div>`
          if (countEl) countEl.textContent = '0 entries'
          if (prevBtn) prevBtn.disabled = true
          if (nextBtn) nextBtn.disabled = true
          return
        }

        wrap.innerHTML = `
          <div style="overflow-x:auto;-webkit-overflow-scrolling:touch;">
          <table style="width:100%;min-width:520px;border-collapse:collapse;font-size:12px">
            <thead>
              <tr style="border-bottom:2px solid var(--border-2)">
                <th style="text-align:left;padding:8px 10px;color:var(--text-3);font-weight:600;white-space:nowrap;min-width:90px">Time</th>
                <th style="text-align:left;padding:8px 10px;color:var(--text-3);font-weight:600;min-width:100px">User</th>
                <th style="text-align:left;padding:8px 10px;color:var(--text-3);font-weight:600;min-width:110px">Action</th>
                <th style="text-align:left;padding:8px 10px;color:var(--text-3);font-weight:600;min-width:100px">Subject</th>
                <th style="text-align:left;padding:8px 10px;color:var(--text-3);font-weight:600;min-width:120px">Detail</th>
              </tr>
            </thead>
            <tbody>
              ${data.entries.map(e => {
                const meta = e.meta ? (() => { try { return JSON.parse(e.meta) } catch { return {} } })() : {}
                const ROLE_DISPLAY = { member: 'Member', lead: 'Project Lead', admin: 'Admin' }
                const fmtRole = r => ROLE_DISPLAY[r] || r
                const detail = meta.changed ? `Changed: ${meta.changed.join(', ')}` : meta.from && meta.to ? `${fmtRole(meta.from)} → ${fmtRole(meta.to)}` : meta.preview ? meta.preview : ''
                const actor  = { name: e.actor_name, initials: e.actor_initials, color: e.actor_color }
                return `<tr style="border-bottom:1px solid var(--border-2)">
                  <td style="padding:8px 10px;white-space:nowrap;color:var(--text-3)">${fmtRelative(e.created_at)}</td>
                  <td style="padding:8px 10px;white-space:nowrap">
                    <div style="display:flex;align-items:center;gap:6px">
                      ${avatarHtml(actor, 20)}
                      <span style="font-weight:500">${esc(e.actor_name || 'System')}</span>
                    </div>
                  </td>
                  <td style="padding:8px 10px;white-space:nowrap">${ACTION_LABELS[e.action] || esc(e.action)}</td>
                  <td style="padding:8px 10px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)" title="${esc(e.entity_name||'')}">
                    ${esc(e.entity_name || e.entity_id || '—')}
                  </td>
                  <td style="padding:8px 10px;color:var(--text-2);max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${esc(detail)}">
                    ${esc(detail || '—')}
                  </td>
                </tr>`
              }).join('')}
            </tbody>
          </table>
          </div>`

        if (countEl) countEl.textContent = `${data.total} total entries · showing ${auditOffset + 1}–${Math.min(auditOffset + AUDIT_PAGE, data.total)}`
        if (prevBtn) prevBtn.disabled = auditOffset === 0
        if (nextBtn) nextBtn.disabled = auditOffset + AUDIT_PAGE >= data.total
      } catch (err) {
        wrap.innerHTML = `<p class="text-2 text-sm" style="color:var(--red)">Failed to load audit log: ${esc(err.message)}</p>`
      }
    }

          <h3 class="section-title" style="margin-bottom:4px">Restore from Backup</h3>
          <p class="text-2 text-sm" style="margin-bottom:8px">
            Upload a <code style="font-family:var(--mono);font-size:11px;padding:1px 5px;background:var(--gray-100);border-radius:3px">.ftbackup</code> file to restore data.
            Restore is <strong>additive</strong> — existing records are updated with backup values and records not in the backup are left untouched.
            This means it is safe to run against a live instance and will never delete data you have created since the backup was taken.
          </p>
          <div style="padding:10px 14px;background:rgba(255,152,0,.07);border:1px solid rgba(255,152,0,.3);border-radius:var(--r-md);font-size:12px;color:var(--orange,#ff9800);margin-bottom:16px;display:flex;gap:10px;align-items:flex-start">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span>Passwords and 2FA secrets are included in the backup. Restoring on a new instance will allow users to log in with their original credentials immediately. If the new instance uses a different <code style="font-family:var(--mono);font-size:11px">PASSWORD_PEPPER</code>, users will need to reset their passwords.</span>
          </div>

          <div class="backup-drop-zone" id="restore-drop-zone">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <p>Drop a <strong>.ftbackup</strong> file here, or click to browse</p>
            <small>Maximum 256 MB</small>
            <input type="file" id="restore-file-input" accept=".ftbackup,application/octet-stream" style="display:none" />
          </div>

          <div id="restore-preview-area" style="margin-top:16px;display:none"></div>
          <div id="restore-result-area"  style="margin-top:16px;display:none"></div>
        </div>`

      // ── Export button ───────────────────────────────────────────────────────
      document.getElementById('export-btn').addEventListener('click', async () => {
        const btn    = document.getElementById('export-btn')
        const status = document.getElementById('export-status')
        btn.disabled = true
        btn.innerHTML = `<svg class="spinner" xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" opacity=".25"/><path d="M21 12a9 9 0 00-9-9"/></svg> Generating…`
        status.textContent = 'Building backup — this may take a moment for large instances…'
        try {
          const resp = await fetch('/api/backup/export', { credentials: 'include' })
          if (!resp.ok) {
            const err = await resp.json().catch(() => ({ error: 'Export failed' }))
            throw new Error(err.error || 'Export failed')
          }
          // Stream response into a Blob then trigger download
          const blob = await resp.blob()
          const cd   = resp.headers.get('Content-Disposition') || ''
          const fnMatch = cd.match(/filename="([^"]+)"/)
          const filename = fnMatch ? fnMatch[1] : 'forgetrack-backup.ftbackup'
          const url  = URL.createObjectURL(blob)
          const a    = document.createElement('a')
          a.href = url; a.download = filename
          document.body.appendChild(a); a.click()
          document.body.removeChild(a)
          URL.revokeObjectURL(url)
          const kb = (blob.size / 1024).toFixed(0)
          const mb = (blob.size / 1024 / 1024).toFixed(2)
          status.textContent = `✓ Downloaded ${blob.size > 1024*1024 ? mb + ' MB' : kb + ' KB'} — ${filename}`
          status.style.color = 'var(--green)'
        } catch (err) {
          status.textContent = '✗ ' + err.message
          status.style.color = 'var(--red,#de350b)'
        } finally {
          btn.disabled = false
          btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Download Backup`
        }
      })

      // ── Drop zone & file picker ────────────────────────────────────────────
      const dropZone  = document.getElementById('restore-drop-zone')
      const fileInput = document.getElementById('restore-file-input')

      dropZone.addEventListener('click', () => fileInput.click())
      dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over') })
      dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'))
      dropZone.addEventListener('drop', e => {
        e.preventDefault(); dropZone.classList.remove('drag-over')
        const file = e.dataTransfer.files[0]
        if (file) handleRestoreFile(file)
      })
      fileInput.addEventListener('change', e => {
        const file = e.target.files[0]
        if (file) handleRestoreFile(file)
      })

      // ── Parse backup file and show preview ────────────────────────────────
      function handleRestoreFile(file) {
        const previewArea = document.getElementById('restore-preview-area')
        const resultArea  = document.getElementById('restore-result-area')
        resultArea.style.display = 'none'
        resultArea.innerHTML = ''

        if (!file.name.endsWith('.ftbackup') && file.type !== 'application/octet-stream' && file.type !== '') {
          previewArea.style.display = 'block'
          previewArea.innerHTML = `<div class="backup-result-err">Not a valid backup file. Please select a <code>.ftbackup</code> file.</div>`
          return
        }

        previewArea.style.display = 'block'
        previewArea.innerHTML = `<div class="backup-progress"><svg class="spinner" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" opacity=".25"/><path d="M21 12a9 9 0 00-9-9"/></svg> Reading backup file…</div>`

        const reader = new FileReader()
        reader.onerror = () => {
          previewArea.innerHTML = `<div class="backup-result-err">Failed to read file.</div>`
        }
        reader.onload = ev => {
          let manifest
          try {
            manifest = JSON.parse(ev.target.result)
          } catch {
            previewArea.innerHTML = `<div class="backup-result-err">File could not be parsed. Make sure it is a valid <code>.ftbackup</code> file and has not been modified.</div>`
            return
          }

          if (manifest.format !== 'forgetrack-backup') {
            previewArea.innerHTML = `<div class="backup-result-err">Not a ForgeTrack backup file.</div>`
            return
          }
          if (manifest.version > 1) {
            previewArea.innerHTML = `<div class="backup-result-err">This backup was created with a newer version of ForgeTrack (format v${manifest.version}). Please upgrade first.</div>`
            return
          }

          const t = manifest.tables || {}
          const fileCount = Object.keys(manifest.files || {}).length
          const exportedAt = manifest.exported_at ? new Date(manifest.exported_at).toLocaleString() : 'unknown'
          const instance   = manifest.instance || 'unknown'
          const fileSizeMB = (file.size / 1024 / 1024).toFixed(2)

          previewArea.innerHTML = `
            <div class="restore-preview">
              <h5>Backup Details</h5>
              <div class="restore-row"><span>Exported at</span><span>${esc(exportedAt)}</span></div>
              <div class="restore-row"><span>Source instance</span><span>${esc(instance)}</span></div>
              <div class="restore-row"><span>File size</span><span>${fileSizeMB} MB</span></div>
            </div>
            <div class="restore-preview">
              <h5>Contents</h5>
              <div class="restore-row"><span>Users</span><span>${(t.users||[]).length}</span></div>
              <div class="restore-row"><span>Projects</span><span>${(t.projects||[]).length}</span></div>
              <div class="restore-row"><span>Issues</span><span>${(t.issues||[]).length}</span></div>
              <div class="restore-row"><span>Comments</span><span>${(t.comments||[]).length}</span></div>
              <div class="restore-row"><span>Labels</span><span>${(t.issue_labels||[]).length}</span></div>
              <div class="restore-row"><span>Attachments</span><span>${(t.issue_attachments||[]).length}</span></div>
              <div class="restore-row"><span>Embedded files (images &amp; docs)</span><span>${fileCount}</span></div>
              <div class="restore-row"><span>Preferences</span><span>${(t.app_preferences||[]).length}</span></div>
            </div>
            <div style="padding:10px 14px;background:rgba(0,82,204,.06);border:1px solid rgba(0,82,204,.2);border-radius:var(--r-md);font-size:12px;color:var(--brand);margin-bottom:16px">
              Restore is <strong>additive</strong>: existing records will be updated with values from the backup, and records not present in the backup will not be touched. No data will be deleted.
            </div>
            <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
              <button class="btn btn-primary" id="restore-confirm-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.73"/></svg>
                Restore Now
              </button>
              <button class="btn btn-secondary" id="restore-cancel-btn">Cancel</button>
              <span style="font-size:12px;color:var(--text-3)">This cannot be undone — export a fresh backup first if unsure</span>
            </div>`

          document.getElementById('restore-cancel-btn').addEventListener('click', () => {
            previewArea.style.display = 'none'
            previewArea.innerHTML = ''
            fileInput.value = ''
          })

          document.getElementById('restore-confirm-btn').addEventListener('click', () => {
            doRestore(ev.target.result, file.size)
          })
        }
        reader.readAsText(file)
      }

      // ── Send restore to server ────────────────────────────────────────────
      async function doRestore(rawJson, fileSize) {
        const previewArea = document.getElementById('restore-preview-area')
        const resultArea  = document.getElementById('restore-result-area')

        previewArea.innerHTML = `<div class="backup-progress">
          <svg class="spinner" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" opacity=".25"/><path d="M21 12a9 9 0 00-9-9"/></svg>
          Restoring — writing to database and extracting files. Do not close this page…
        </div>`

        try {
          const resp = await fetch('/api/backup/restore', {
            method:  'POST',
            headers: { 'Content-Type': 'text/plain' },
            body:    rawJson,
            credentials: 'include',
          })
          const data = await resp.json()
          if (!resp.ok) throw new Error(data.error || 'Restore failed')

          const s = data.stats || {}
          previewArea.style.display = 'none'
          resultArea.style.display  = 'block'
          resultArea.innerHTML = `
            <div class="backup-result-ok">
              <div style="font-weight:700;color:var(--green);margin-bottom:10px;font-size:13px">✓ Restore complete</div>
              <div class="restore-preview" style="margin-bottom:0">
                <h5>Restored</h5>
                <div class="restore-row"><span>Users</span><span>${s.users ?? 0}</span></div>
                <div class="restore-row"><span>Projects</span><span>${s.projects ?? 0}</span></div>
                <div class="restore-row"><span>Issues</span><span>${s.issues ?? 0}</span></div>
                <div class="restore-row"><span>Comments</span><span>${s.comments ?? 0}</span></div>
                <div class="restore-row"><span>Labels</span><span>${s.labels ?? 0}</span></div>
                <div class="restore-row"><span>Attachments</span><span>${s.attachments ?? 0}</span></div>
                <div class="restore-row"><span>Files written to disk</span><span>${s.files ?? 0}</span></div>
              </div>
              <div style="margin-top:12px;font-size:12px;color:var(--text-2)">
                Source: ${esc(data.instance || 'unknown')} · Exported ${data.exported_at ? new Date(data.exported_at).toLocaleString() : ''}
              </div>
              <button class="btn btn-secondary btn-sm" onclick="location.reload()" style="margin-top:12px">Reload page</button>
            </div>`
        } catch (err) {
          previewArea.style.display = 'none'
          resultArea.style.display  = 'block'
          resultArea.innerHTML = `<div class="backup-result-err"><strong>Restore failed</strong><br>${esc(err.message)}</div>`
        }
      }
    }

  })()
  </script>
</body>
</html>
