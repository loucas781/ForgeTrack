<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings — ForgeTrack</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
  <script>!function(){var t=localStorage.getItem("ft-theme")||"system";t!=="system"&&document.documentElement.setAttribute("data-theme",t)}()</script>
  <style>
    .settings-tabs-wrap {
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border-2);
    }
    /* Tab bar — horizontal scroll on mobile */
    .settings-tabs {
      display: flex; gap: 0; overflow-x: auto; scrollbar-width: none;
      padding: 0 16px;
    }
    .settings-tabs::-webkit-scrollbar { display: none; }
    .settings-tab {
      display: flex; align-items: center; gap: 7px;
      padding: 12px 16px; background: none; border: none;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      font-family: var(--font); font-size: 13px; font-weight: 500;
      color: var(--text-2); cursor: pointer; white-space: nowrap;
      transition: color var(--t-fast), border-color var(--t-fast);
    }
    .settings-tab:hover { color: var(--text); }
    .settings-tab.active { color: var(--brand); border-bottom-color: var(--brand); }
    .settings-tab svg { width: 14px; height: 14px; flex-shrink: 0; }
    .settings-panel { display: none; padding: 24px; max-width: 720px; }
    .settings-panel.active { display: block; }
    .section-card { margin-bottom: 20px; }
    .info-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .info-table td { padding: 10px 14px; border-bottom: 1px solid var(--border-2); }
    .info-table td:first-child { color: var(--text-2); width: 160px; }
    .info-table tr:last-child td { border-bottom: none; }
    .member-row { display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--border-2); }
    .member-row:last-child { border-bottom: none; }
    .theme-options { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 4px; }
    .theme-option {
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      padding: 12px 16px; border: 2px solid var(--border-2); border-radius: var(--r-lg);
      background: var(--gray-50); cursor: pointer; min-width: 80px;
      transition: border-color var(--t-fast), background var(--t-fast);
    }
    .theme-option:hover { border-color: var(--brand); }
    .theme-option.active { border-color: var(--brand); background: var(--brand-light); }
    .theme-option span { font-size: 12px; font-weight: 500; color: var(--text-2); }
    .theme-option.active span { color: var(--brand); }
    .theme-swatch { width: 40px; height: 28px; border-radius: 6px; border: 1px solid var(--border); }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-bottom: 16px; }
    .stat-card { background: var(--gray-50); border: 1px solid var(--border-2); border-radius: var(--r-lg); padding: 14px; }
    .stat-val { font-size: 26px; font-weight: 700; font-family: var(--mono); color: var(--text); line-height: 1; }
    .stat-lbl { font-size: 11px; color: var(--text-3); margin-top: 4px; }
    /* 2FA */
    .twofa-status { display:flex; align-items:center; gap:10px; padding:12px 16px; background:var(--gray-50); border:1px solid var(--border-2); border-radius:var(--r-lg); margin-bottom:16px; }
    .twofa-enabled  { color: var(--green); }
    .twofa-disabled { color: var(--text-3); }
    .qr-wrap { text-align:center; padding:16px; background:var(--gray-50); border:1px solid var(--border-2); border-radius:var(--r-lg); margin-bottom:16px; }
    .qr-wrap canvas { display:inline-block; }
    @media (max-width: 600px) {
      .settings-tab { padding: 10px 12px; font-size: 12px; }
      .settings-panel { padding: 16px; }
      .info-table td:first-child { width: 120px; }
    }
  </style>
</head>
<body>
  <div id="app-root"></div>
  <script src="/js/app.js"></script>
  <script src="/js/shell.js"></script>
  <!-- QR code library for 2FA setup -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
  (async () => {
    const TABS = [
      { id:'appearance', label:'Appearance', icon:'<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>' },
      { id:'team',       label:'Team',       icon:'<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/>' },
      { id:'security',   label:'Security',   icon:'<path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>' },
      { id:'build',      label:'Build Info', icon:'<rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>' },
    ]

    injectShell()
    await initTopbar()
    document.title = 'Settings — ForgeTrack'

    // Inject tab bar as a sibling of page-content so it doesn't scroll
    const appBody = document.querySelector('.app-body')
    const pageContent = document.getElementById('page-content')
    const tabBar = document.createElement('div')
    tabBar.className = 'settings-tabs-wrap'
    tabBar.innerHTML = `
      <div class="settings-tabs" id="settings-tabs">
        ${TABS.map((t,i) => `
          <button class="settings-tab${i===0?' active':''}" data-panel="${t.id}">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">${t.icon}</svg>
            ${t.label}
          </button>`).join('')}
      </div>`
    // Insert tab bar between topbar and page-content (wrapping app-body contents)
    if (appBody && pageContent) {
      // Restructure: app-body → [tab-bar + page-content vertically]
      appBody.style.flexDirection = 'column'
      appBody.insertBefore(tabBar, pageContent)
    }

    const content = document.getElementById('page-content')
    const [config, users, projects, issues] = await Promise.all([GET('/config'), GET('/users'), GET('/projects'), GET('/issues')])
    const me = config.user
    const v = config.version || '0.0.1'
    const isDev = v.includes('-dev.'), isRC = v.includes('-rc')
    const base = v.split('-')[0]
    const devNum = isDev ? v.split('-dev.')[1] : null
    const tag = isDev ? `v${base}-dev.${devNum}` : isRC ? `v${base}-rc` : `v${base}`
    const vColor = isDev ? 'var(--orange)' : isRC ? 'var(--brand)' : 'var(--green)'
    const vLabel = isDev ? `dev build #${devNum}` : isRC ? 'release candidate' : 'stable release'


    content.innerHTML = `
      <div class="settings-panel active" id="panel-appearance">
        <div class="card section-card">
          <h3 class="section-title">Colour scheme</h3>
          <p class="text-2 text-sm" style="margin-bottom:16px">Choose a theme or follow your system preference. Saved to this browser.</p>
          <div class="theme-options">
            <button class="theme-option" data-theme-choice="system">
              <span class="theme-swatch" style="background:linear-gradient(135deg,#f4f5f7 50%,#1e2535 50%)"></span>
              <span>System</span>
            </button>
            <button class="theme-option" data-theme-choice="light">
              <span class="theme-swatch" style="background:#f4f5f7"></span>
              <span>Light</span>
            </button>
            <button class="theme-option" data-theme-choice="dark">
              <span class="theme-swatch" style="background:#1e2535"></span>
              <span>Dark</span>
            </button>
            <button class="theme-option" data-theme-choice="oled">
              <span class="theme-swatch" style="background:#000"></span>
              <span>OLED</span>
            </button>
          </div>
        </div>
      </div>

      <!-- Team -->
      <div class="settings-panel" id="panel-team">
        <div class="card section-card">
          <h3 class="section-title">Members (${users.length})</h3>
          <p class="text-2 text-sm" style="margin-bottom:16px">New members sign up at <code style="font-size:11px;background:var(--gray-100);padding:1px 6px;border-radius:3px">/signup.html</code></p>
          ${users.map(u => `
            <div class="member-row">
              ${avatarHtml(u, 36)}
              <div style="flex:1;min-width:0">
                <div style="font-size:14px;font-weight:500;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
                  ${esc(u.name)}
                  ${u.id === me?.id ? `<span class="role-badge">you</span>` : ''}
                </div>
                <div class="text-3 text-sm" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(u.email)}</div>
              </div>
              <span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:2px 8px;border-radius:2px;background:var(--gray-100);color:var(--text-2);flex-shrink:0">${esc(u.role)}</span>
            </div>`).join('')}
        </div>
      </div>

      <!-- Security / 2FA -->
      <div class="settings-panel" id="panel-security">
        <div class="card section-card" id="https-toggle-card">
          <h3 class="section-title">HTTPS Mode</h3>
          <p class="text-2 text-sm" style="margin-bottom:16px">
            When enabled, session cookies are only sent over secure HTTPS connections.
            <strong>Only turn this on once you have a valid SSL certificate and are running behind HTTPS.</strong>
            Enabling this on a plain HTTP server will silently break logins.
          </p>
          <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--gray-50);border:1px solid var(--border-2);border-radius:var(--r-lg)">
            <div>
              <div style="font-weight:600;font-size:13px">Secure cookies (COOKIE_SECURE)</div>
              <div class="text-2 text-sm" id="https-status-text">Loading…</div>
            </div>
            <button class="btn" id="https-toggle-btn" style="min-width:80px" disabled>…</button>
          </div>
          <div style="margin-top:10px;padding:10px 14px;border-radius:var(--r-md);font-size:12px;display:flex;gap:8px;align-items:flex-start" id="https-warning-bar" style="display:none">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
            <span id="https-warning-text"></span>
          </div>
        </div>
        <div class="card section-card">
          <h3 class="section-title">Two-Factor Authentication (2FA)</h3>
          <p class="text-2 text-sm" style="margin-bottom:16px">
            Add a second layer of security. Once enabled you'll be asked for a one-time code from your authenticator app on every login.
          </p>
          <div id="twofa-area">
            <div style="text-align:center;padding:24px;color:var(--text-3)">Loading…</div>
          </div>
        </div>
        <div class="card section-card">
          <h3 class="section-title">Passkeys</h3>
          <p class="text-2 text-sm" style="margin-bottom:12px">
            Passkeys let you sign in with Face ID, Touch ID or a device PIN — no password needed.
          </p>
          <div style="padding:14px;background:var(--gray-50);border:1px solid var(--border-2);border-radius:var(--r-lg);display:flex;gap:12px;align-items:flex-start">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" stroke="var(--orange)" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
            <p class="text-2 text-sm" style="margin:0">
              Passkey support (WebAuthn) requires the app to be served over HTTPS with a consistent domain name.
              It will be available once you've deployed to staging or production behind your Nginx proxy.
            </p>
          </div>
        </div>
      </div>

      <!-- Build info -->
      <div class="settings-panel" id="panel-build">
        <div class="card section-card">
          <h3 class="section-title">Version</h3>
          <div style="display:flex;align-items:center;gap:20px;padding:16px;background:var(--gray-50);border:1px solid var(--border-2);border-radius:var(--r-lg);margin-bottom:16px;flex-wrap:wrap;gap:12px">
            <div>
              <div style="font-size:30px;font-weight:700;font-family:var(--mono);color:var(--text);line-height:1">v${base}</div>
              <div style="margin-top:6px">
                <span style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:2px 10px;border-radius:10px;background:${vColor}18;color:${vColor};border:1px solid ${vColor}40">${vLabel}</span>
              </div>
            </div>
            <div style="flex:1;min-width:120px;text-align:right;font-size:12px">
              <div class="text-3">Build string</div>
              <div class="mono" style="color:var(--text-2);margin-top:2px">${esc(v)}</div>
              <div class="text-3" style="margin-top:8px">Git tag</div>
              <a href="https://github.com/loucas781/ForgeTrack/releases/tag/${tag}" target="_blank" rel="noopener" class="mono" style="color:var(--brand)">${esc(tag)}</a>
            </div>
          </div>
          <table class="info-table">
            <tr><td>Environment</td><td><span class="env-chip ${esc(config.appEnv)}">${esc(config.appEnv)}</span></td></tr>
            <tr><td>App name</td><td>${esc(config.appName)}</td></tr>
          </table>
        </div>
        <div class="card section-card">
          <h3 class="section-title">Instance Statistics</h3>
          <div class="stat-grid">
            <div class="stat-card"><div class="stat-val">${projects.length}</div><div class="stat-lbl">Projects</div></div>
            <div class="stat-card"><div class="stat-val">${issues.length}</div><div class="stat-lbl">Total Issues</div></div>
            <div class="stat-card"><div class="stat-val">${issues.filter(i=>i.status!=='done'&&i.status!=='cancelled').length}</div><div class="stat-lbl">Open</div></div>
            <div class="stat-card"><div class="stat-val">${issues.filter(i=>i.status==='inprogress').length}</div><div class="stat-lbl">In Progress</div></div>
            <div class="stat-card"><div class="stat-val">${issues.filter(i=>i.type==='bug').length}</div><div class="stat-lbl">Bugs</div></div>
            <div class="stat-card"><div class="stat-val">${users.length}</div><div class="stat-lbl">Members</div></div>
          </div>
          <table class="info-table">
            <tr><td>Database</td><td>PostgreSQL</td></tr>
            <tr><td>Runtime</td><td>Node.js</td></tr>
          </table>
        </div>
      </div>`

    // ── Tab switching ──────────────────────────────────────────────
    function switchTab(id) {
      tabBar.querySelectorAll('.settings-tab').forEach(b => b.classList.toggle('active', b.dataset.panel === id))
      document.querySelectorAll('.settings-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + id))
      history.replaceState(null, '', '#' + id)
      if (id === 'security') { renderHTTPS(); renderTwoFA() }
    }
    tabBar.querySelectorAll('.settings-tab').forEach(btn => btn.addEventListener('click', () => switchTab(btn.dataset.panel)))
    const hash = location.hash.replace('#', '')
    if (hash && TABS.find(t => t.id === hash)) switchTab(hash)

    // ── Theme picker ───────────────────────────────────────────────
    function updateThemeUI(choice) {
      document.querySelectorAll('.theme-option').forEach(o => o.classList.toggle('active', o.dataset.themeChoice === choice))
    }
    updateThemeUI(localStorage.getItem('ft-theme') || 'system')
    document.querySelectorAll('.theme-option').forEach(opt => {
      opt.addEventListener('click', () => {
        const choice = opt.dataset.themeChoice
        localStorage.setItem('ft-theme', choice)
        const html = document.documentElement
        html.classList.add('theme-transitioning')
        setTimeout(() => html.classList.remove('theme-transitioning'), 400)
        choice === 'system' ? html.removeAttribute('data-theme') : html.setAttribute('data-theme', choice)
        updateThemeUI(choice)
        document.querySelectorAll('.theme-picker-item').forEach(i => i.classList.toggle('active', i.dataset.themeChoice === choice))
      })
    })

    // ── 2FA ────────────────────────────────────────────────────────
    let twofaSetupData = null

    // ── HTTPS / Cookie Secure toggle (admin only) ───────────────────
    async function renderHTTPS() {
      const card = document.getElementById('https-toggle-card')
      if (!card) return
      const cfg = await GET('/config')
      if (cfg.user?.role !== 'admin') { card.style.display = 'none'; return }

      card.innerHTML = `
        <h3 class="section-title">HTTPS / Reverse Proxy</h3>
        <p class="text-2 text-sm" style="margin-bottom:16px">
          Configure these once you are running behind a reverse proxy (e.g. Nginx Proxy Manager) with a valid SSL certificate.
          <strong>Do not enable Secure Cookies on plain HTTP — it will lock everyone out.</strong>
        </p>

        <div style="display:flex;flex-direction:column;gap:10px">
          <!-- Secure cookies row -->
          <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--gray-50);border:1px solid var(--border-2);border-radius:var(--r-lg)">
            <div>
              <div style="font-weight:600;font-size:13px">Secure Cookies</div>
              <div class="text-2 text-sm" id="cookie-status-text"></div>
            </div>
            <button class="btn btn-sm" id="cookie-toggle-btn" style="min-width:80px">…</button>
          </div>

          <!-- Trust proxy row -->
          <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--gray-50);border:1px solid var(--border-2);border-radius:var(--r-lg)">
            <div>
              <div style="font-weight:600;font-size:13px">Trust Reverse Proxy</div>
              <div class="text-2 text-sm" id="proxy-status-text"></div>
            </div>
            <button class="btn btn-sm" id="proxy-toggle-btn" style="min-width:80px">…</button>
          </div>
        </div>

        <div id="https-warning-bar" style="display:none;margin-top:12px;padding:10px 14px;border-radius:var(--r-md);font-size:12px;display:flex;gap:8px;align-items:flex-start">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
          <span id="https-warning-text"></span>
        </div>`

      let cookieSecure = cfg.cookieSecure
      let trustProxy   = cfg.trustProxy

      function updateCookieUI() {
        const btn  = document.getElementById('cookie-toggle-btn')
        const text = document.getElementById('cookie-status-text')
        btn.textContent = cookieSecure ? 'Disable' : 'Enable'
        btn.className   = `btn btn-sm ${cookieSecure ? 'btn-danger' : 'btn-primary'}`
        text.textContent = cookieSecure ? '🔒 Enabled — HTTPS only' : '⚠️ Disabled — HTTP allowed'
        text.style.color = cookieSecure ? 'var(--green)' : 'var(--orange)'
      }

      function updateProxyUI() {
        const btn  = document.getElementById('proxy-toggle-btn')
        const text = document.getElementById('proxy-status-text')
        btn.textContent = trustProxy ? 'Disable' : 'Enable'
        btn.className   = `btn btn-sm ${trustProxy ? 'btn-danger' : 'btn-primary'}`
        text.textContent = trustProxy
          ? '✓ Enabled — requires server restart to take effect'
          : '✗ Disabled — enable when behind Nginx/Caddy etc.'
        text.style.color = trustProxy ? 'var(--green)' : 'var(--text-3)'
      }

      updateCookieUI()
      updateProxyUI()

      document.getElementById('cookie-toggle-btn').addEventListener('click', async () => {
        const action = cookieSecure ? 'disable' : 'enable'
        if (!confirm(`${action === 'enable' ? 'Only enable secure cookies if HTTPS is fully working.\n\nEnabling on plain HTTP will lock everyone out.' : 'Disable secure cookies?\n\nCookies will be sent over HTTP.'}`)) return
        try {
          const result = await PATCH('/config', { cookieSecure: !cookieSecure })
          cookieSecure = result.cookieSecure
          updateCookieUI()
          toast(`Secure cookies ${cookieSecure ? 'enabled' : 'disabled'}`, 'success')
        } catch (err) { toast(err.message, 'error') }
      })

      document.getElementById('proxy-toggle-btn').addEventListener('click', async () => {
        if (!confirm(`${trustProxy ? 'Disable' : 'Enable'} reverse proxy trust?\n\nThis requires a server restart to take effect.`)) return
        try {
          const result = await PATCH('/config', { trustProxy: !trustProxy })
          trustProxy = result.trustProxy
          updateProxyUI()
          const bar  = document.getElementById('https-warning-bar')
          const text = document.getElementById('https-warning-text')
          bar.style.cssText = 'display:flex;margin-top:12px;padding:10px 14px;border-radius:var(--r-md);font-size:12px;gap:8px;align-items:flex-start;background:rgba(255,153,0,.08);border:1px solid rgba(255,153,0,.3);color:var(--text-1)'
          text.textContent = 'Restart the ForgeTrack service for the proxy change to take effect: systemctl restart forgetrack'
        } catch (err) { toast(err.message, 'error') }
      })
    }

    async function renderTwoFA() {
      const area = document.getElementById('twofa-area')
      try {
        const status = await GET('/auth/2fa/status')
        if (status.enabled) {
          area.innerHTML = `
            <div class="twofa-status">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="var(--green)" stroke-width="2" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
              <div>
                <div style="font-weight:600;font-size:14px;color:var(--green)">Two-factor authentication is enabled</div>
                <div class="text-3 text-sm">Your account is protected with an authenticator app.</div>
              </div>
            </div>
            <button class="btn btn-danger" id="disable-2fa-btn">Disable 2FA</button>`
          document.getElementById('disable-2fa-btn').addEventListener('click', () => {
            area.innerHTML = `
              <div class="danger-confirm" style="margin-bottom:12px">
                <p style="font-size:13px;font-weight:600;margin:0 0 10px">Enter your current 6-digit code to confirm.</p>
                <input class="form-control" type="text" inputmode="numeric" id="disable-2fa-code" placeholder="000000" maxlength="6" style="max-width:160px;margin-bottom:10px" />
                <div id="disable-2fa-err" style="color:var(--red);font-size:13px;display:none;margin-bottom:8px"></div>
                <div style="display:flex;gap:10px">
                  <button class="btn btn-danger" id="confirm-disable-2fa">Disable 2FA</button>
                  <button class="btn btn-secondary" id="cancel-disable-2fa">Cancel</button>
                </div>
              </div>`
            document.getElementById('cancel-disable-2fa').addEventListener('click', renderTwoFA)
            document.getElementById('confirm-disable-2fa').addEventListener('click', async () => {
              const code = document.getElementById('disable-2fa-code').value.trim()
              const errEl = document.getElementById('disable-2fa-err')
              try {
                await POST('/auth/2fa/disable', { code })
                renderTwoFA()
              } catch (e) { errEl.textContent = e.message; errEl.style.display = 'block' }
            })
          })
        } else {
          area.innerHTML = `
            <div class="twofa-status">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="var(--text-3)" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
              <div>
                <div style="font-weight:600;font-size:14px">Two-factor authentication is off</div>
                <div class="text-3 text-sm">Enable it to protect your account with an authenticator app.</div>
              </div>
            </div>
            <button class="btn btn-primary" id="enable-2fa-btn">Set up 2FA</button>`
          document.getElementById('enable-2fa-btn').addEventListener('click', async () => {
            try {
              twofaSetupData = await POST('/auth/2fa/setup', {})
              area.innerHTML = `
                <p class="text-2 text-sm" style="margin-bottom:12px">
                  Scan this QR code with your authenticator app (Google Authenticator, Authy, 1Password, etc.), then enter the 6-digit code to verify.
                </p>
                <div class="qr-wrap">
                  <div id="qr-canvas"></div>
                  <p class="text-3 text-sm" style="margin-top:10px">Or enter this key manually:</p>
                  <code style="font-size:13px;letter-spacing:.1em;color:var(--text-2)">${twofaSetupData.secret}</code>
                </div>
                <div class="form-group">
                  <label class="form-label">Verification code</label>
                  <input class="form-control" type="text" inputmode="numeric" id="verify-2fa-code" placeholder="000000" maxlength="6" style="max-width:160px" />
                </div>
                <div id="verify-2fa-err" style="color:var(--red);font-size:13px;display:none;margin-bottom:8px"></div>
                <div style="display:flex;gap:10px">
                  <button class="btn btn-primary" id="verify-2fa-btn">Verify &amp; Enable</button>
                  <button class="btn btn-secondary" id="cancel-2fa-setup">Cancel</button>
                </div>`
              // Render QR
              new QRCode(document.getElementById('qr-canvas'), {
                text: twofaSetupData.otpauth,
                width: 160, height: 160,
                colorDark: document.documentElement.dataset.theme?.includes('dark') || window.matchMedia('(prefers-color-scheme:dark)').matches ? '#c7d1e0' : '#000',
                colorLight: 'transparent',
              })
              document.getElementById('cancel-2fa-setup').addEventListener('click', renderTwoFA)
              document.getElementById('verify-2fa-btn').addEventListener('click', async () => {
                const code  = document.getElementById('verify-2fa-code').value.trim()
                const errEl = document.getElementById('verify-2fa-err')
                errEl.style.display = 'none'
                try {
                  await POST('/auth/2fa/verify', { secret: twofaSetupData.secret, code })
                  renderTwoFA()
                } catch (e) { errEl.textContent = e.message; errEl.style.display = 'block' }
              })
            } catch (e) { toast(e.message, 'error') }
          })
        }
      } catch { area.innerHTML = `<p class="text-2 text-sm">Could not load 2FA status.</p>` }
    }
  })()
  </script>
</body>
</html>
