<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project — ForgeTrack</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/main.css" />
  <script>!function(){var t=localStorage.getItem("ft-theme")||"system";t!=="system"&&document.documentElement.setAttribute("data-theme",t)}()</script>
</head>
<body>
  <div id="app-root"></div>
  <script src="/js/app.js"></script>
  <script src="/js/shell.js"></script>
  <script>
  (async () => {
    const pid  = getParam('id')
    const view = getParam('view') || 'issues'
    if (!pid) { location.href = '/'; return }

    const project = await GET('/projects/' + pid).catch(() => null)
    if (!project) { location.href = '/'; return }

    injectShell({ project, activePage: view })
    await initTopbar()

    const canManage = userCanManageProject(project)  // admin or project lead

    // Hide the Project Settings sidebar link for non-managers (lead of a different project,
    // or plain member). Can't do this before initTopbar — APP_CONFIG.user isn't set yet.
    if (!canManage) {
      const settingsLink = document.querySelector('.sidebar-link[href*="view=settings"]')
      if (settingsLink) {
        // Remove the "Project" section label immediately before it
        const prev = settingsLink.previousElementSibling
        if (prev?.classList.contains('sidebar-section-label')) prev.remove()
        settingsLink.remove()
      }
    }

    const content = document.getElementById('page-content')
    document.title = `${project.name} — ForgeTrack`

    // Redirect members away from settings — they have no actions there
    if (view === 'settings' && !canManage) {
      location.href = `/project.html?id=${pid}&view=issues`
      return
    }

    if (view === 'settings') {
      await renderSettings(project, content)
    } else {
      await renderIssueList(project, content, view)
    }

    // ── Global create issue (wired to topbar button) ──────────────────────────
    document.getElementById('create-issue-btn')?.addEventListener('click', async () => {
      if (project.is_closed) {
        showToast('This project is closed — new issues cannot be created.', 'error')
        return
      }
      const users = await GET('/users')
      populateSelect(document.getElementById('ci-project'), [project], 'id', 'name')
      document.getElementById('ci-project').value = project.id
      const asgn = document.getElementById('ci-assignee')
      populateSelect(asgn, users.filter(u => u.role === 'admin' || u.role === 'engineer'), 'id', 'name', 'Unassigned')
      await applyCreateIssuePrefs()
      openModal('create-issue-modal')
    })
    document.getElementById('create-issue-form')?.addEventListener('submit', async e => {
      e.preventDefault()
      if (!validateCreateIssuePrefs()) return
      try {
        const issue = await POST('/issues', {
          project_id:   document.getElementById('ci-project').value,
          title:        document.getElementById('ci-title').value.trim(),
          description:  document.getElementById('ci-desc').value.trim(),
          type:         document.getElementById('ci-type').value,
          status:       document.getElementById('ci-status').value,
          priority:     document.getElementById('ci-priority').value,
          assignee_id:  document.getElementById('ci-assignee').value || null,
          story_points: parseInt(document.getElementById('ci-points').value) || null,
          due_date:     document.getElementById('ci-due').value || null,
          labels:       document.getElementById('ci-labels').value.split(',').map(l=>l.trim()).filter(Boolean),
        })
        closeModal('create-issue-modal')
        await uploadPendingAttachments(issue.id)
        location.href = `/issue.html?id=${issue.id}`
      } catch (err) { toast(err.message, 'error') }
    })

    // ── Create project btn ────────────────────────────────────────────────────
    document.getElementById('create-project-btn')?.addEventListener('click', async () => {
      const users = await GET('/users')
      populateSelect(document.getElementById('cp-lead'), users.filter(u => u.role === 'admin' || u.role === 'lead'), 'id', 'name', '— Select lead —')
      renderColorPicker(document.getElementById('cp-colors'), PROJECT_COLORS, '#0052cc', v => document.getElementById('cp-color').value = v)
      openModal('create-project-modal')
    })
    document.getElementById('cp-name')?.addEventListener('input', e => { document.getElementById('cp-key').value = genProjectKey(e.target.value) })
    document.getElementById('cp-key')?.addEventListener('input', e => { e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,6) })
    document.getElementById('create-project-form')?.addEventListener('submit', async e => {
      e.preventDefault()
      try {
        const proj = await POST('/projects', { name: document.getElementById('cp-name').value.trim(), key: document.getElementById('cp-key').value.trim(), description: document.getElementById('cp-desc').value.trim(), color: document.getElementById('cp-color').value, lead_id: document.getElementById('cp-lead').value || null })
        closeModal('create-project-modal')
        location.href = `/project.html?id=${proj.id}&view=issues`
      } catch (err) { toast(err.message, 'error') }
    })
  })()

  // ── Issue list view ─────────────────────────────────────────────────────────
  async function renderIssueList(project, content, view) {
    const bugsOnly = view === 'bugs'
    const title    = view === 'backlog' ? 'Backlog' : bugsOnly ? 'Bug Reports' : 'Issues'

    // Build filter state
    const filters = { status: [], type: bugsOnly ? ['bug'] : [], priority: [], assignee: '', q: '' }
    let showFilters = false
    let users = []

    async function fetchAndRender() {
      const qs = new URLSearchParams({ project_id: project.id })
      if (filters.status.length === 1)   qs.set('status',      filters.status[0])
      if (filters.type.length === 1)     qs.set('type',        filters.type[0])
      if (filters.priority.length === 1) qs.set('priority',    filters.priority[0])
      if (filters.assignee)              qs.set('assignee_id', filters.assignee)
      if (filters.q)                     qs.set('q',           filters.q)
      let issues = await GET('/issues?' + qs)

      // Client-side multi-filter (multi-select arrays)
      if (filters.status.length > 1)   issues = issues.filter(i => filters.status.includes(i.status))
      if (filters.type.length > 1)     issues = issues.filter(i => filters.type.includes(i.type))
      if (filters.priority.length > 1) issues = issues.filter(i => filters.priority.includes(i.priority))

      const issueContainer = document.getElementById('issue-container')
      if (issueContainer) renderGroupedIssues(issues, issueContainer)
      document.querySelectorAll('.issue-count').forEach(el => el.textContent = `${issues.length} issue${issues.length!==1?'s':''}`)
    }

    content.innerHTML = `
      <div class="page-pad">
        <div class="page-header">
          <div>
            <h1>${title}${project.is_closed ? ' <span style="font-size:13px;padding:2px 10px;border-radius:10px;background:rgba(255,152,0,.12);color:var(--orange,#ff9800);border:1px solid rgba(255,152,0,.3);font-weight:600;vertical-align:middle">Closed</span>' : ''}</h1>
            <p class="text-2 text-sm mt-4 issue-count"></p>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <button class="btn btn-secondary" id="filter-toggle-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
              Filters
            </button>
            ${project.is_closed
              ? `<button class="btn btn-secondary" disabled title="This project is closed — no new issues can be created" style="opacity:.5;cursor:not-allowed">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                  Closed
                </button>`
              : `<button class="btn btn-primary" id="create-issue-page-btn">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
                  ${bugsOnly ? 'Report Bug' : 'Create Issue'}
                </button>`
            }
          </div>
        </div>

        <!-- Filter bar (hidden by default) -->
        <div class="card filter-bar" id="filter-bar" style="display:none;margin-bottom:16px">
          <input class="form-control" type="text" id="filter-q" placeholder="Search issues…" style="max-width:220px" />
          <div class="filter-group">
            <span class="filter-label">Status</span>
            ${['todo','inprogress','review','done','cancelled'].map(s => `<button class="filter-chip" data-filter="status" data-val="${s}">${STATUS_LABELS[s]}</button>`).join('')}
          </div>
          ${!bugsOnly ? `<div class="filter-group">
            <span class="filter-label">Type</span>
            ${['bug','task','story','epic'].map(t => `<button class="filter-chip" data-filter="type" data-val="${t}">${TYPE_LABELS[t]}</button>`).join('')}
          </div>` : ''}
          <div class="filter-group">
            <span class="filter-label">Priority</span>
            ${['critical','high','medium','low','trivial'].map(p => `<button class="filter-chip" data-filter="priority" data-val="${p}">${PRIORITY_LABELS[p]}</button>`).join('')}
          </div>
          <div class="filter-group">
            <span class="filter-label">Assignee</span>
            <select class="form-control" id="filter-assignee" style="height:28px;font-size:12px;width:auto"></select>
          </div>
          <button class="btn btn-ghost btn-sm" id="clear-filters-btn">✕ Clear</button>
        </div>

        <div id="issue-container"></div>
      </div>`

    users = await GET('/users')
    const asnSel = document.getElementById('filter-assignee')
    asnSel.innerHTML = '<option value="">All</option><option value="unassigned">Unassigned</option>' +
      users.map(u => `<option value="${u.id}">${esc(u.name)}</option>`).join('')

    // Filter toggle
    document.getElementById('filter-toggle-btn').addEventListener('click', () => {
      showFilters = !showFilters
      document.getElementById('filter-bar').style.display = showFilters ? 'flex' : 'none'
    })
    document.getElementById('clear-filters-btn').addEventListener('click', () => {
      filters.status = []; filters.type = bugsOnly ? ['bug'] : []; filters.priority = []; filters.assignee = ''; filters.q = ''
      document.getElementById('filter-q').value = ''
      document.getElementById('filter-assignee').value = ''
      document.querySelectorAll('.filter-chip.on').forEach(c => c.classList.remove('on'))
      fetchAndRender()
    })

    // Filter chips
    document.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const key = chip.dataset.filter, val = chip.dataset.val
        chip.classList.toggle('on')
        const arr = filters[key]
        const idx = arr.indexOf(val)
        if (idx >= 0) arr.splice(idx, 1); else arr.push(val)
        fetchAndRender()
      })
    })
    let searchDebounce
    document.getElementById('filter-q').addEventListener('input', e => {
      clearTimeout(searchDebounce)
      searchDebounce = setTimeout(() => { filters.q = e.target.value.trim(); fetchAndRender() }, 250)
    })
    asnSel.addEventListener('change', e => { filters.assignee = e.target.value; fetchAndRender() })

    // Initial load
    fetchAndRender()

    // Create issue button (on this page, pre-fill project)
    document.getElementById('create-issue-page-btn')?.addEventListener('click', async () => {
      populateSelect(document.getElementById('ci-project'), [project], 'id', 'name')
      document.getElementById('ci-project').value = project.id
      if (bugsOnly) document.getElementById('ci-type').value = 'bug'
      const asgn = document.getElementById('ci-assignee')
      populateSelect(asgn, users.filter(u => u.role === 'admin' || u.role === 'engineer'), 'id', 'name', 'Unassigned')
      await applyCreateIssuePrefs()
      openModal('create-issue-modal')
    })
  }

  // ── Project settings view ───────────────────────────────────────────────────
  async function renderSettings(project, content) {
    const users = await GET('/users')
    let selectedColor = project.color
    let confirmingDelete = false
    let projectIconDataUrl = null

    content.innerHTML = `
      <div class="page-pad" style="max-width:860px">
        <h1 style="margin-bottom:4px">Project Settings</h1>
        <p class="text-2" style="margin-bottom:32px">Manage configuration for ${esc(project.name)}</p>

        <!-- General settings -->
        <div class="card section-card">
          <h3 class="section-title">General</h3>
          <form id="project-settings-form">
            <div class="form-group">
              <label class="form-label req">Project Name</label>
              <input class="form-control" type="text" id="ps-name" value="${esc(project.name)}" required />
            </div>
            <div class="form-grid-2">
              <div class="form-group">
                <label class="form-label req">Project Key</label>
                <input class="form-control" type="text" id="ps-key" value="${esc(project.key)}" maxlength="6" style="font-family:var(--mono);font-weight:600;text-transform:uppercase" required />
                <span class="form-hint">Prefix for issue keys e.g. ${esc(project.key)}-42</span>
              </div>
              <div class="form-group">
                <label class="form-label">Project Lead</label>
                <select class="form-control" id="ps-lead">
                  <option value="">— None —</option>
                  ${users.filter(u => u.role === 'admin' || u.role === 'lead').map(u => `<option value="${u.id}"${u.id===project.lead_id?' selected':''}>${esc(u.name)}</option>`).join('')}
                </select>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Description</label>
              <textarea class="form-control" id="ps-desc" rows="3">${esc(project.description||'')}</textarea>
            </div>
            <div class="form-group">
              <label class="form-label">Project Icon <span class="text-3" style="font-weight:400">(optional — overrides the colour initial)</span></label>
              <div style="display:flex;align-items:center;gap:14px">
                <div id="ps-icon-preview" style="cursor:pointer;position:relative;flex-shrink:0" title="Click to upload a project icon">
                  ${projectIcon(project, 48)}
                  <div style="position:absolute;inset:0;border-radius:4px;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 200ms" id="ps-icon-overlay">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
                  </div>
                  <input type="file" id="ps-icon-input" accept="image/*" style="display:none" />
                </div>
                <div>
                  <div class="text-2 text-sm" id="ps-icon-hint">Click the icon to upload an image</div>
                  ${project.icon ? `<button type="button" class="btn btn-ghost btn-sm" id="ps-icon-remove" style="margin-top:4px;color:var(--red)">Remove photo</button>` : ''}
                </div>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Project Colour <span class="text-3" style="font-weight:400">(used as fallback when no icon is set)</span></label>
              <div class="color-picker" id="ps-colors"></div>
            </div>
            <div style="display:flex;align-items:center;gap:12px">
              <button type="submit" class="btn btn-primary">Save Changes</button>
              <span id="ps-saved" style="color:var(--green);font-size:13px;display:none">✓ Saved!</span>
            </div>
          </form>
        </div>

        <!-- Close / Reopen Project -->
        <div class="card section-card">
          <h3 class="section-title" style="color:${project.is_closed ? 'var(--orange)' : 'var(--text)'}">Project Status</h3>
          <p class="text-2 text-sm" style="margin-bottom:16px">
            ${project.is_closed
              ? 'This project is <strong>closed</strong>. No new issues can be created. Existing issues remain visible and editable.'
              : 'Closing a project prevents new issues from being created. Existing issues are not affected.'}
          </p>
          <button class="btn ${project.is_closed ? 'btn-primary' : 'btn-secondary'}" id="toggle-closed-btn">
            ${project.is_closed ? '✓ Reopen Project' : 'Close Project'}
          </button>
          <span id="close-saved" style="color:var(--green);font-size:13px;display:none;margin-left:10px">✓ Saved!</span>
        </div>

        <!-- Danger zone -->
        <div class="card section-card danger-zone">
          <h3 class="section-title" style="color:var(--red)">Danger Zone</h3>
          <p class="text-2" style="margin-bottom:16px">Deleting a project is permanent and removes all associated issues and data.</p>
          <div id="delete-area">
            <button class="btn btn-danger" id="delete-project-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
              Delete Project
            </button>
          </div>
        </div>
      </div>`

    document.getElementById('ps-key').addEventListener('input', e => {
      e.target.value = e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,6)
    })
    renderColorPicker(document.getElementById('ps-colors'), PROJECT_COLORS, selectedColor, v => { selectedColor = v })

    // Project icon upload
    const iconPreview = document.getElementById('ps-icon-preview')
    const iconInput   = document.getElementById('ps-icon-input')
    const iconOverlay = document.getElementById('ps-icon-overlay')
    if (iconPreview && iconInput) {
      iconPreview.addEventListener('mouseenter', () => { if (iconOverlay) iconOverlay.style.opacity = '1' })
      iconPreview.addEventListener('mouseleave', () => { if (iconOverlay) iconOverlay.style.opacity = '0' })
      iconPreview.addEventListener('click', () => iconInput.click())
      iconInput.addEventListener('change', e => {
        const file = e.target.files[0]
        if (!file) return
        if (file.size > 2 * 1024 * 1024) { toast('Image must be under 2MB', 'error'); return }
        const reader = new FileReader()
        reader.onload = ev => {
          projectIconDataUrl = ev.target.result
          iconPreview.innerHTML = `
            <img src="${projectIconDataUrl}" style="width:48px;height:48px;border-radius:4px;object-fit:cover;display:block" />
            <div style="position:absolute;inset:0;border-radius:4px;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 200ms" id="ps-icon-overlay">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
            </div>
            <input type="file" id="ps-icon-input" accept="image/*" style="display:none" />`
          // Re-wire overlay hover since innerHTML was replaced
          const newOverlay = iconPreview.querySelector('#ps-icon-overlay')
          iconPreview.addEventListener('mouseenter', () => { if (newOverlay) newOverlay.style.opacity = '1' })
          iconPreview.addEventListener('mouseleave', () => { if (newOverlay) newOverlay.style.opacity = '0' })
          const newInput = iconPreview.querySelector('#ps-icon-input')
          if (newInput) newInput.addEventListener('change', iconInput.onchange)
          const hint = document.getElementById('ps-icon-hint')
          if (hint) hint.textContent = 'Icon selected — click Save to apply'
        }
        reader.readAsDataURL(file)
      })
    }
    document.getElementById('ps-icon-remove')?.addEventListener('click', () => {
      projectIconDataUrl = ''  // empty string = clear
      iconPreview.innerHTML = projectIcon({ key: project.key, color: project.color, icon: null }, 48)
      const hint = document.getElementById('ps-icon-hint')
      if (hint) hint.textContent = 'Icon removed — click Save to apply'
    })

    document.getElementById('toggle-closed-btn')?.addEventListener('click', async () => {
      try {
        const newClosed = !project.is_closed
        await PATCH('/projects/' + project.id, { is_closed: newClosed })
        project.is_closed = newClosed
        const btn = document.getElementById('toggle-closed-btn')
        const hdr = btn.closest('.card').querySelector('h3')
        const desc = btn.closest('.card').querySelector('p')
        btn.textContent = newClosed ? '✓ Reopen Project' : 'Close Project'
        btn.className = `btn ${newClosed ? 'btn-primary' : 'btn-secondary'}`
        hdr.style.color = newClosed ? 'var(--orange)' : 'var(--text)'
        desc.innerHTML = newClosed
          ? 'This project is <strong>closed</strong>. No new issues can be created. Existing issues remain visible and editable.'
          : 'Closing a project prevents new issues from being created. Existing issues are not affected.'
        const saved = document.getElementById('close-saved')
        saved.style.display = 'inline'
        setTimeout(() => saved.style.display = 'none', 2500)
      } catch (err) { toast(err.message, 'error') }
    })

    document.getElementById('project-settings-form').addEventListener('submit', async e => {
      e.preventDefault()
      try {
        const body = {
          name:        document.getElementById('ps-name').value.trim(),
          key:         document.getElementById('ps-key').value.trim(),
          description: document.getElementById('ps-desc').value.trim(),
          color:       selectedColor,
          lead_id:     document.getElementById('ps-lead').value || null,
        }
        if (projectIconDataUrl !== null) body.icon = projectIconDataUrl || null
        await PATCH('/projects/' + project.id, body)
        projectIconDataUrl = null
        const saved = document.getElementById('ps-saved')
        saved.style.display = 'inline'
        setTimeout(() => saved.style.display = 'none', 2500)
      } catch (err) { toast(err.message, 'error') }
    })

    document.getElementById('delete-project-btn').addEventListener('click', () => {
      if (!confirmingDelete) {
        confirmingDelete = true
        document.getElementById('delete-area').innerHTML = `
          <div class="danger-confirm">
            <p style="font-size:13px;font-weight:600">Are you absolutely sure? This cannot be undone.</p>
            <div style="display:flex;gap:12px">
              <button class="btn btn-danger" id="confirm-delete-btn">Yes, Delete Project</button>
              <button class="btn btn-secondary" id="cancel-delete-btn">Cancel</button>
            </div>
          </div>`
        document.getElementById('confirm-delete-btn').addEventListener('click', async () => {
          try { await DELETE('/projects/' + project.id); location.href = '/' }
          catch (err) { toast(err.message, 'error') }
        })
        document.getElementById('cancel-delete-btn').addEventListener('click', () => {
          confirmingDelete = false
          document.getElementById('delete-area').innerHTML = `<button class="btn btn-danger" id="delete-project-btn">Delete Project</button>`
        })
      }
    })
  }
  </script>
</body>
</html>
